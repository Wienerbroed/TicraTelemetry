<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Pool Viewer</title>
<link rel="stylesheet" href="styles/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="scripts/utils.js"></script>
<style>
#tableContainerWrapper { position: relative; margin-bottom: 20px; }
#downloadBtn { display: none; margin: 10px auto; cursor: pointer; background: none; border: none; padding: 0; }
#downloadBtn img { display: block; }

.tooltip {
  position: absolute;
  background: rgba(255,255,255,0.95);
  border: 1px solid #aaa;
  border-radius: 6px;
  padding: 8px;
  font-size: 12px;
  max-width: 500px;
  z-index: 9999;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.tooltip img {
  max-width: 500px;
  max-height: 300px;
  display: block;
  margin-top: 4px;
}
</style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
    <a href="data.html"> Event DataPool </a>
    <a href="session.html"> Sessions </a>
  </div>
</header>

<h1>Event Pool Viewer</h1>

<div id="filters">
  <div>
    <strong>Date interval:</strong>
    <label>Start date: <input type="date" id="startDate"></label>
    <label>End date: <input type="date" id="endDate"></label>

    
      <button type="button" class="preset-btn" data-range="10">Last 10 days</button>
      <button type="button" class="preset-btn" data-range="30">Last 1 month</button>
      <button type="button" class="preset-btn" data-range="all">All time</button>
    
  </div>

  <div>
    <strong>Event types:</strong>
    <div id="eventTypeGroup" class="checkbox-group"></div>
  </div>

  <div>
    <strong>Employee types:</strong>
    <div id="employeeTypeGroup" class="checkbox-group"></div>
  </div>

  <div>
    <button id="applyButton">Apply</button>
  </div>
</div>

<div id="queryBoxesContainer"></div>

<div id="tableContainerWrapper">
  <div id="tableContainer">
    <table id="bigTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
  <button id="downloadBtn" type="button" title="Download CSV">
    <img src="/images/Excel-Logo.png" alt="Excel" width="80">
  </button>
</div>

<div id="multiChartContainer"></div>

<!-- Tooltip element -->
<div id="tooltip" class="tooltip"></div>

<footer>© TICRA foundation</footer>

<script type="module">
import { COLORS, setDefaultDateRange, fetchJson, createCell, sortTableByRow, renderMultipleBarCharts, applyStickyColumns, downloadTableCSV } from './scripts/utils.js';

const STATE = { fullEvents: [], activeUsers: [], userOrder: [], rowSortStates: {}, eventTypeOrder: [], allEmployeeTypes: [] };
setDefaultDateRange('startDate','endDate',10);

const tooltip = document.getElementById('tooltip');

async function loadEventTypes() {
  const data = await fetchJson('/eventQueries');
  const container = document.getElementById('eventTypeGroup');
  container.innerHTML = '';
  data.forEach(ev => {
    const label = document.createElement('label');
    const input = document.createElement('input'); input.type='checkbox'; input.value=ev;
    label.appendChild(input); label.appendChild(document.createTextNode(ev));
    container.appendChild(label);
  });
}

async function loadEmployeeTypes() {
  const data = await fetchJson('/employeeTypes');
  STATE.allEmployeeTypes = data.sort();
  const container = document.getElementById('employeeTypeGroup');
  container.innerHTML = '';
  STATE.allEmployeeTypes.forEach(emp=>{
    const label=document.createElement('label');
    const input=document.createElement('input'); input.type='checkbox'; input.value=emp; input.classList.add('employee-checkbox');
    label.appendChild(input); label.appendChild(document.createTextNode(emp));
    container.appendChild(label);
  });
}

function getCheckedEmployeeTypes(){
  const checkboxes = Array.from(document.querySelectorAll('#employeeTypeGroup input.employee-checkbox'));
  const checked = checkboxes.filter(b=>b.checked).map(b=>b.value);
  return checked.length===checkboxes.length? null : checked;
}

function getCheckedValues(containerId){
  return Array.from(document.getElementById(containerId).querySelectorAll('input:checked')).map(i=>i.value);
}

function formatDate(date) {
  return date.toISOString().split('T')[0];
}

function setPresetRange(range) {
  const startInput = document.getElementById('startDate');
  const endInput = document.getElementById('endDate');

  const today = new Date();

  if (range === 'all') {
    const fixedStart = new Date('2026-01-01');
    startInput.value = formatDate(fixedStart);
    endInput.value = formatDate(today);
    return;
  }

  const past = new Date();

  if (range === 30) {
    past.setMonth(today.getMonth() - 1); 
  } else {
    past.setDate(today.getDate() - range);
  }

  startInput.value = formatDate(past);
  endInput.value = formatDate(today);
}


document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const range = btn.dataset.range;
    setPresetRange(range === 'all' ? 'all' : parseInt(range));
  });
});


// APPLY BUTTON
document.getElementById('applyButton').addEventListener('click', async () => {
  const selectedEventTypes = getCheckedValues('eventTypeGroup');
  if (!selectedEventTypes.length) return;
  const selectedEmployees = getCheckedEmployeeTypes();
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;

  STATE.fullEvents = [];
  STATE.eventTypeOrder = [];
  document.getElementById('queryBoxesContainer').innerHTML = '';

  for (const [idx, eventType] of selectedEventTypes.entries()) {
    const params = new URLSearchParams();
    params.append('inputEventType', eventType);
    if (startDate) params.append('startTime', startDate+'T00:00:00');
    if (endDate) params.append('endTime', endDate+'T23:59:59');
    if (selectedEmployees) selectedEmployees.forEach(emp => params.append('employeeType', emp));

    const url = `/data?${params.toString()}`;
    const data = await fetchJson(url);

    const events = (data.events ?? []).map(ev => {
      let selection = "unknown";
      if (ev.payload && Object.keys(ev.payload).length) {
        selection = String(Object.values(ev.payload)[0] ?? "unknown");
      }
      return { eventType, user: ev.user_name ?? "unknown", selection, employee_type: ev.employee_type ?? "unknown", count: ev.count ?? 0 };
    });

    STATE.fullEvents.push(...events);
    STATE.eventTypeOrder.push(eventType);
  }

  STATE.eventTypeOrder = [...new Set(STATE.eventTypeOrder)];
  renderTableAndCharts();
});

// PER-USER DATA
function buildPerUser(events){
  const perUser={}, totals={};
  events.forEach(e=>totals[e.user]=(totals[e.user]??0)+e.count);
  STATE.activeUsers = Object.keys(totals).filter(u=>totals[u]>0).sort();
  STATE.userOrder = [...STATE.activeUsers];
  STATE.activeUsers.forEach(u=>perUser[u]={});
  events.forEach(e=>{
    if(totals[e.user]>0) perUser[e.user][`${e.eventType}::${e.selection}`] = (perUser[e.user][`${e.eventType}::${e.selection}`]??0)+e.count;
  });
  return perUser;
}
function getSelections(perUser){ return [...new Set(Object.keys(perUser).flatMap(u=>Object.keys(perUser[u])))].sort(); }

// DOWNLOAD BUTTON
const downloadBtn = document.getElementById('downloadBtn');
downloadBtn.addEventListener('click',()=>downloadTableCSV());
function toggleDownloadButton(show){ downloadBtn.style.display = show?'block':'none'; }

// DRAW TABLE
async function drawTable(perUser, selections) {
  const table = document.getElementById('bigTable');
  const thead = table.querySelector('thead'); 
  const tbody = table.querySelector('tbody');
  thead.innerHTML = ''; 
  tbody.innerHTML = '';

  // ----------------------
  // HEADER
  // ----------------------
  const headerRow = document.createElement('tr');
  ['Operation', 'MOST USED', 'AVERAGE', 'TOTAL', ...STATE.userOrder].forEach((text, index) => {
    const th = document.createElement('th'); 
    th.classList.add('rotate', 'sticky');
    if (index === 0) th.style.position = 'relative';
    const div = document.createElement('div'); 
    div.textContent = text;
    th.appendChild(div); 
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);

  // ----------------------
  // TABLE BODY
  // ----------------------
  let rowColorToggle = false; // start with white
  for (const eventType of STATE.eventTypeOrder) {
    const eventSelections = selections.filter(s => s.startsWith(eventType + '::'));

    // Fetch config once for this eventType
    const config = await fetchJson(`/api/configs/${encodeURIComponent(eventType)}`).catch(() => null);
    const description = config?.description ?? '';
    const imgSrc = config?.extra_query?.image?.data
      ? `data:${config.extra_query.image.contentType};base64,${config.extra_query.image.data}`
      : null;

    // Compute column max for heatmap
    const columnMax = {}; 
    STATE.userOrder.forEach(u => {
      let maxVal = 0; 
      eventSelections.forEach(sel => { 
        const val = perUser[u]?.[sel] ?? 0; 
        if (val > maxVal) maxVal = val; 
      }); 
      columnMax[u] = maxVal;
    });

    for (const sel of eventSelections) {
      const tr = document.createElement('tr'); 
      tr.classList.add('sortable');

      // ----------------------
      // SET ROW COLOR FOR OPERATION COLUMN ONLY
      // ----------------------
      tr.classList.add(rowColorToggle ? 'eventtype-grey' : 'eventtype-white');

      const displayName = sel.split('::')[1];

      // ----------------------
      // OPERATION CELL
      // ----------------------
      const opCell = createCell(displayName, false, null, 'operation-cell');
      tr.appendChild(opCell);

      // ----------------------
      // TOOLTIP
      // ----------------------
opCell.addEventListener('mouseenter', (e) => {
    tooltip.innerHTML = ''; 
    tooltip.style.display = 'block';

    if (eventType) {
        const titleP = document.createElement('p');
        titleP.textContent = eventType;
        titleP.style.fontWeight = 'bold';
        tooltip.appendChild(titleP);
    }

    if (description) { 
        const p = document.createElement('p'); 
        p.textContent = description; 
        tooltip.appendChild(p); 
    }
    if (imgSrc) { 
        const img = document.createElement('img'); 
        img.src = imgSrc; 
        tooltip.appendChild(img); 
    }
    const selP = document.createElement('p'); 
    selP.textContent = displayName; 
    tooltip.appendChild(selP);

    
    
    const offsetY = 10; 
    tooltip.style.top = `${e.pageY - tooltip.offsetHeight - offsetY}px`;
    tooltip.style.left = `${e.pageX - tooltip.offsetWidth / 10}px`;
});

opCell.addEventListener('mousemove', (e) => {
    
    const offsetY = 10;
    tooltip.style.top = `${e.pageY - tooltip.offsetHeight - offsetY}px`;
    tooltip.style.left = `${e.pageX - tooltip.offsetWidth / 100}px`;
});

opCell.addEventListener('mouseleave', () => { 
    tooltip.style.display = 'none'; 
});


      // ----------------------
      // SUMMARY CELLS
      // ----------------------
      const total = STATE.userOrder.reduce((sum, u) => sum + (perUser[u]?.[sel] ?? 0), 0);
      const avg = STATE.userOrder.length ? (total / STATE.userOrder.length).toFixed(2) : 0;
      let mostUsed = 0; 
      STATE.userOrder.forEach(u => {
        if ((perUser[u]?.[sel] ?? 0) === columnMax[u] && columnMax[u] > 0) mostUsed++;
      });
      tr.appendChild(createCell(mostUsed, false, null, 'summary-cell'));
      tr.appendChild(createCell(avg, false, null, 'summary-cell'));
      tr.appendChild(createCell(total, false, null, 'summary-cell'));

      // ----------------------
      // USER CELLS (heatmap)
      // ----------------------
      STATE.userOrder.forEach(u => {
        const val = perUser[u]?.[sel] ?? 0;
        const intensity = columnMax[u] ? Math.pow(val / columnMax[u], 0.5) : 0;
        const hue = 120, lightness = 100 - intensity * 60;
        const color = intensity > 0.6 ? '#fff' : '#000';
        const td = createCell(val, false, null, 'user-cell');
        td.style.backgroundColor = `hsl(${hue},70%,${lightness}%)`; 
        td.style.color = color;
        tr.appendChild(td);
      });

      // ----------------------
      // ROW HOVER
      // ----------------------
      tr.addEventListener('mouseenter', () => { 
        opCell.style.backgroundColor = 'rgba(252,199,93,0.5)'; 
        opCell.style.fontWeight = 'bold'; 
      });
      tr.addEventListener('mouseleave', () => { 
        opCell.style.backgroundColor = ''; 
        opCell.style.fontWeight = ''; 
      });

      // ----------------------
      // ROW CLICK SORTING
      // ----------------------
      tr.addEventListener('click', () => sortTableByRow(table, tr, STATE.rowSortStates, 4));

      tbody.appendChild(tr);
    }

    // ----------------------
    // Toggle color for next eventType
    // ----------------------
    rowColorToggle = !rowColorToggle;
  }

  applyStickyColumns(table, 4);
  toggleDownloadButton(tbody.children.length > 0);
}



// RENDER TABLE & CHARTS
function renderTableAndCharts(){
  const perUser=buildPerUser(STATE.fullEvents);
  const selections=getSelections(perUser);
  drawTable(perUser,selections);
  const chartContainer=document.getElementById('multiChartContainer');
  chartContainer.style.display='grid'; chartContainer.style.gridTemplateColumns='repeat(2,1fr)'; chartContainer.style.gap='20px';
  renderMultipleBarCharts(chartContainer,perUser,STATE.eventTypeOrder,COLORS,false);
}

loadEventTypes(); loadEmployeeTypes();
</script>

</body>
</html>
