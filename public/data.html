<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Pool Viewer</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/data.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
    <a href="data.html"> Event DataPool </a>
    <a href="session.html"> Sessions </a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</header>

<h1>Event Pool Viewer</h1>

<div id="filters">
  <div>
    <strong>Date interval:</strong>
    <label>Start date: <input type="date" id="startDate"></label>
    <label>End date: <input type="date" id="endDate"></label>

    <button type="button" class="preset-btn" data-range="10">Last 10 days</button>
    <button type="button" class="preset-btn" data-range="30">Last 1 month</button>
    <button type="button" class="preset-btn" data-range="all">All time</button>
  </div>

  <div>
    <strong>Event types:</strong>
    <div id="eventTypeGroup" class="checkbox-group"></div>
  </div>

  <div>
    <strong>Employee types:</strong>
    <div id="employeeTypeGroup" class="checkbox-group"></div>
  </div>

  <div>
    <button id="applyButton">Apply</button>
  </div>
</div>

<div id="queryBoxesContainer"></div>

<div id="tableContainerWrapper">
  <div id="tableContainer">
    <table id="bigTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div>
  <button id="downloadBtn" type="button" title="Download CSV">Download excel</button>
</div>

<div id="multiChartContainer"></div>

<!-- Tooltip element only for event type hover -->
<div id="tooltip" class="tooltip"></div>

<script type="module">
import { 
  COLORS, setDefaultDateRange, fetchJson, renderMultipleBarCharts, 
  drawTable, toggleDownloadButton, sortTableByRow, applyStickyColumns, downloadTableCSV 
} from './scripts/utils.js';

const STATE = { fullEvents: [], activeUsers: [], userOrder: [], rowSortStates: {}, eventTypeOrder: [], allEmployeeTypes: [] };
setDefaultDateRange('startDate','endDate',10);

const tooltip = document.getElementById('tooltip'); 

// ================= LOAD EVENT TYPES =================
async function loadEventTypes() {
  const data = await fetchJson('/eventQueries');
  const container = document.getElementById('eventTypeGroup');
  container.innerHTML = '';

  for (const ev of data) {
    const wrapper = document.createElement('div');
    wrapper.classList.add('checkbox-container');

    const label = document.createElement('label');
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.value = ev;
    label.appendChild(input);
    label.appendChild(document.createTextNode(ev));

    const config = await fetchJson(`/api/configs/${encodeURIComponent(ev)}`).catch(() => null);
    const description = config?.description ?? '';
    const imgSrc = config?.extra_query?.image?.data
      ? `data:${config.extra_query.image.contentType};base64,${config.extra_query.image.data}`
      : null;

    function showTooltip() {
      tooltip.innerHTML = '';
      if(ev){
        const p = document.createElement('p'); 
        p.textContent = ev; 
        p.classList.add('title'); 
        tooltip.appendChild(p);
      }
      if(description){
        const p = document.createElement('p'); 
        p.textContent = description; 
        p.classList.add('description'); 
        tooltip.appendChild(p);
      }
      if(imgSrc){
        const img=document.createElement('img'); 
        img.src=imgSrc; 
        tooltip.appendChild(img);
      }
      const rect = label.getBoundingClientRect();
      tooltip.style.top = `${rect.bottom + 10 + window.scrollY}px`;
      tooltip.style.left = `${rect.left + window.scrollX}px`;
      tooltip.style.display = 'block';
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    label.addEventListener('mouseenter', showTooltip);
    label.addEventListener('mouseleave', hideTooltip);

    wrapper.appendChild(label);
    container.appendChild(wrapper);
  }
}

// ================= LOAD EMPLOYEE TYPES =================
async function loadEmployeeTypes() {
  const data = await fetchJson('/employeeTypes');
  STATE.allEmployeeTypes = data.sort();
  const container = document.getElementById('employeeTypeGroup');
  container.innerHTML = '';
  STATE.allEmployeeTypes.forEach(emp=>{
    const label=document.createElement('label');
    const input=document.createElement('input'); 
    input.type='checkbox'; 
    input.value=emp; 
    input.classList.add('employee-checkbox');
    label.appendChild(input); 
    label.appendChild(document.createTextNode(emp));
    container.appendChild(label);
  });
}

// ================= HELPER FUNCTIONS =================
function getCheckedEmployeeTypes(){
  const checkboxes = Array.from(document.querySelectorAll('#employeeTypeGroup input.employee-checkbox'));
  const checked = checkboxes.filter(b=>b.checked).map(b=>b.value);
  return checked.length===checkboxes.length? null : checked;
}

function getCheckedValues(containerId){
  return Array.from(document.getElementById(containerId).querySelectorAll('input:checked')).map(i=>i.value);
}

function formatDate(date) { return date.toISOString().split('T')[0]; }

function setPresetRange(range) {
  const startInput = document.getElementById('startDate');
  const endInput = document.getElementById('endDate');
  const today = new Date();
  if (range === 'all') { 
    const fixedStart = new Date('2026-01-01'); 
    startInput.value=formatDate(fixedStart); 
    endInput.value=formatDate(today); 
    return; 
  }
  const past = new Date(); 
  if(range===30) past.setMonth(today.getMonth()-1); 
  else past.setDate(today.getDate()-range);
  startInput.value=formatDate(past); 
  endInput.value=formatDate(today);
}

document.querySelectorAll('.preset-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const range = btn.dataset.range;
    setPresetRange(range==='all'?'all':parseInt(range));
  });
});

// ================= URL STATE MANAGEMENT =================
function updateURLWithFilters() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const events = getCheckedValues('eventTypeGroup');
  const employees = getCheckedEmployeeTypes() ?? [];

  const params = new URLSearchParams();
  if (startDate) params.set('startDate', startDate);
  if (endDate) params.set('endDate', endDate);
  if (events.length) params.set('events', events.join(','));
  if (employees.length) params.set('employees', employees.join(','));

  const newUrl = `${window.location.pathname}?${params.toString()}`;
  window.history.replaceState({}, '', newUrl);
}

function applyFiltersFromURL() {
  const params = new URLSearchParams(window.location.search);
  const startDate = params.get('startDate');
  const endDate = params.get('endDate');
  const events = params.get('events')?.split(',') ?? [];
  const employees = params.get('employees')?.split(',') ?? [];

  if (startDate) document.getElementById('startDate').value = startDate;
  if (endDate) document.getElementById('endDate').value = endDate;

  // Wait for event and employee types to load
  const interval = setInterval(() => {
    const eventInputs = document.querySelectorAll('#eventTypeGroup input');
    const empInputs = document.querySelectorAll('#employeeTypeGroup input');

    if(eventInputs.length && empInputs.length){
      eventInputs.forEach(input => {
        if(events.includes(input.value)) input.checked = true;
      });
      empInputs.forEach(input => {
        if(employees.includes(input.value)) input.checked = true;
      });
      if(events.length) document.getElementById('applyButton').click();
      clearInterval(interval);
    }
  }, 100);
}

// ================= APPLY BUTTON =================
document.getElementById('applyButton').addEventListener('click', async ()=>{
  const selectedEventTypes = getCheckedValues('eventTypeGroup');
  if(!selectedEventTypes.length) return;
  const selectedEmployees = getCheckedEmployeeTypes();
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;

  STATE.fullEvents = [];
  STATE.eventTypeOrder = [];
  document.getElementById('queryBoxesContainer').innerHTML='';

  for(const eventType of selectedEventTypes){
    const params = new URLSearchParams();
    params.append('inputEventType', eventType);
    if(startDate) params.append('startTime', startDate+'T00:00:00');
    if(endDate) params.append('endTime', endDate+'T23:59:59');
    if(selectedEmployees) selectedEmployees.forEach(emp=>params.append('employeeType', emp));
    const url = `/data?${params.toString()}`;
    const data = await fetchJson(url);

    const events = (data.events ?? []).map(ev=>{
      let selection="unknown";
      if(ev.payload && Object.keys(ev.payload).length) selection=String(Object.values(ev.payload)[0] ?? "unknown");
      return { eventType, user: ev.user_name ?? "unknown", selection, employee_type: ev.employee_type ?? "unknown", count: ev.count ?? 0 };
    });

    STATE.fullEvents.push(...events);
    STATE.eventTypeOrder.push(eventType);
  }

  STATE.eventTypeOrder = [...new Set(STATE.eventTypeOrder)];
  renderTableAndCharts();
  updateURLWithFilters();
});

// ================= BUILD PER USER =================
function buildPerUser(events){
  const perUser={}, totals={};
  events.forEach(e=>totals[e.user]=(totals[e.user]??0)+e.count);
  STATE.activeUsers = Object.keys(totals).filter(u=>totals[u]>0).sort();
  STATE.userOrder = [...STATE.activeUsers];
  STATE.activeUsers.forEach(u=>perUser[u]={});
  events.forEach(e=>{
    if(totals[e.user]>0) perUser[e.user][`${e.eventType}::${e.selection}`] = (perUser[e.user][`${e.eventType}::${e.selection}`]??0)+e.count;
  });
  return perUser;
}

// ================= DOWNLOAD BUTTON =================
const downloadBtn = document.getElementById('downloadBtn');
downloadBtn.addEventListener('click',()=>downloadTableCSV());

// ================= RENDER TABLE & CHARTS =================
function renderTableAndCharts(){
  const perUser=buildPerUser(STATE.fullEvents);
  drawTable(perUser, STATE);
  const chartContainer=document.getElementById('multiChartContainer');
  chartContainer.style.display='grid';
  chartContainer.style.gridTemplateColumns='repeat(2,1fr)';
  chartContainer.style.gap='20px';
  renderMultipleBarCharts(chartContainer,perUser,STATE.eventTypeOrder,COLORS,false);
}

// ================= INITIAL LOAD =================
loadEventTypes().then(loadEmployeeTypes).then(() => {
  applyFiltersFromURL(); // auto-load filters from URL
});

</script>



</body>
</html>
