<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Pool Widgets</title>

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/data.css">
<link rel="stylesheet" href="styles/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

</style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html"><img src="images/ticra.png" class="nav-icon"></a>
    <a href="data.html">Event DataPool</a>
    <a href="session.html">Sessions</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</header>

<h1 style="padding:16px;">Event Pool Viewer</h1>

<div style="padding:16px;">
  <button id="addWidgetBtn">+ Add Widget</button>
</div>

<div id="widgetGrid"></div>

<script type="module">

import { TableWidget } from './scripts/dashboardTable.js';
import { ChartWidget } from './scripts/dashboardChart.js';
import { SessionTableWidget } from './scripts/dashboardTable.js';
import { SessionChartWidget } from './scripts/dashboardChart.js';
import { TimelineWidget } from './scripts/dashboardTimeline.js';
import { fetchJson } from './scripts/utils.js';
import { Widget } from './scripts/widgets.js';

const grid = document.getElementById('widgetGrid');

/* =========================
   ADD PLACEHOLDER WIDGET
========================= */
document.getElementById('addWidgetBtn').onclick = () => {
  const wrapper = document.createElement('div');
  wrapper.classList.add('widget-small');

  // Placeholder Widget
  const placeholder = document.createElement('div');
  placeholder.classList.add('widget', 'placeholder-widget');
  placeholder.draggable = true;

  const placeholderText = document.createElement('div');
  placeholderText.classList.add('widget-placeholder-text');
  placeholderText.textContent = 'Click to select widget';
  placeholder.appendChild(placeholderText);

  // Widget choice menu
  const menu = document.createElement('div');
  menu.classList.add('widget-placeholder-menu');

  const widgetOptions = [
    { name: 'Table', cls: TableWidget, size: 'widget-small' },
    { name: 'Chart', cls: ChartWidget, size: 'widget-small' },
    { name: 'Session Table', cls: SessionTableWidget, size: 'widget-small' },
    { name: 'Session Chart', cls: SessionChartWidget, size: 'widget-small' },
    { name: 'Timeline', cls: TimelineWidget, size: 'widget-large' },
  ];

  widgetOptions.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt.name;
    btn.onclick = e => {
      e.stopPropagation();
      wrapper.innerHTML = '';
      wrapper.className = opt.size;
      new opt.cls(wrapper);
    };
    menu.appendChild(btn);
  });

  placeholder.appendChild(menu);

  // Show menu on click
  placeholder.addEventListener('click', e => {
    e.stopPropagation();
    menu.style.display = 'block';
  });

  // Hide menu when clicking outside
  document.addEventListener('click', () => {
    menu.style.display = 'none';
  });

  wrapper.appendChild(placeholder);
  grid.appendChild(wrapper);
};

/* =========================
   DRAG & DROP WIDGETS
========================= */

let dragged = null;

document.addEventListener('dragstart', e => {
  const w = e.target.closest('.widget');
  if (w) { dragged = w; w.classList.add('dragging'); }
});

document.addEventListener('dragend', e => {
  const w = e.target.closest('.widget');
  if (w) { w.classList.remove('dragging'); dragged = null; }
});

document.addEventListener('dragover', e => {
  e.preventDefault();
  const target = e.target.closest('.widget');
  if (!target || !dragged || target === dragged) return;
  const children = [...grid.children];
  const a = children.indexOf(dragged.parentElement);
  const b = children.indexOf(target.parentElement);
  if (a < b) grid.insertBefore(dragged.parentElement, target.parentElement.nextSibling);
  else grid.insertBefore(dragged.parentElement, target.parentElement);
});

</script>


</body>
</html>
