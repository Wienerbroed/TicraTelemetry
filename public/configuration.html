<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Configuration Manager</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/configuration.css">
</head>
<body>

<header>
    <div class="navbar">
        <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
        <a href="data.html">Event DataPool</a>
        <a href="session.html">Sessions</a>
        <a href="dashboard.html">Dashboard</a>
    </div>
</header>

<h1>Configuration Manager</h1>

<!-- Create new config -->
<div class="form-container">
  <h2>Create New Config</h2>
  <input type="text" id="newTitle" placeholder="Config Title"><br>

  <label for="newMode">Mode:</label>
  <select id="newMode">
    <option value="event">event</option>
    <option value="session">session</option>
  </select><br>

  <label for="newEventType">Event Type:</label>
  <select id="newEventType">
    <option value="" disabled selected>-- Loading event types... --</option>
  </select><br>

  <input type="text" id="newPayload" placeholder="Payload Field (e.g., g)"><br>

  <label>Description (max 200 chars):</label>
  <textarea id="newDescription" rows="4" maxlength="200" placeholder="Enter description..."></textarea><br>

  <label>Upload Image (optional):</label>
  <input type="file" id="newImage" accept="image/*"><br>

  <button id="createConfig">Create Config</button>
</div>

<!-- Dropdowns for existing configs -->
<div class="row">
  <div>
    <label>Session Configs</label>
    <select id="sessionDropdown">
      <option value="">-- Select a session config --</option>
    </select>
  </div>
  <div>
    <label>Event Configs</label>
    <select id="eventDropdown">
      <option value="">-- Select an event config --</option>
    </select>
  </div>
</div>

<!-- Display selected config info -->
<div id="configInfoContainer"></div>


<script>
let selectedConfig = null;
let originalTitle = null;

document.addEventListener("DOMContentLoaded", async () => {
  await fetchEventTypes();
  await loadDropdowns();
  addDropdownListeners();
  document.getElementById("createConfig").addEventListener("click", createNewConfig);
});

/* ---------- FETCH EVENT TYPES ---------- */
async function fetchEventTypes() {
  try {
    const res = await fetch("/event");
    if (!res.ok) throw new Error("Failed to fetch event types");
    const types = await res.json();
    const select = document.getElementById("newEventType");
    select.innerHTML = '<option value="" disabled selected>-- Select an event type --</option>';
    types.forEach(type => {
      const option = document.createElement("option");
      option.value = type;
      option.textContent = type;
      select.appendChild(option);
    });
    return types;
  } catch(err) {
    console.error(err);
    document.getElementById("newEventType").innerHTML = '<option value="" disabled selected>-- Error loading --</option>';
    return [];
  }
}

/* ---------- LOAD CONFIG DROPDOWNS ---------- */
async function loadDropdowns() {
  try {
    const res = await fetch("/api/configs");
    if(!res.ok) throw new Error("Failed to fetch configs");
    const configs = await res.json();
    const sessionDropdown = document.getElementById("sessionDropdown");
    const eventDropdown = document.getElementById("eventDropdown");

    sessionDropdown.innerHTML = '<option value="">-- Select a session config --</option>';
    eventDropdown.innerHTML = '<option value="">-- Select an event config --</option>';

    configs.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.title;
      opt.textContent = c.title;
      if(c.mode === "session") sessionDropdown.appendChild(opt);
      if(c.mode === "event") eventDropdown.appendChild(opt);
    });

    if(selectedConfig){
      if(selectedConfig.mode==="session") sessionDropdown.value = selectedConfig.title;
      if(selectedConfig.mode==="event") eventDropdown.value = selectedConfig.title;
    }
  } catch(err) {
    console.error(err);
  }
}

/* ---------- DROPDOWN CHANGE LISTENERS ---------- */
function addDropdownListeners() {
  document.getElementById("sessionDropdown").addEventListener("change", e => showConfigInfo(e.target.value));
  document.getElementById("eventDropdown").addEventListener("change", e => showConfigInfo(e.target.value));
}

/* ---------- SHOW CONFIG INFO ---------- */
async function showConfigInfo(title) {
  if(!title) {
    document.getElementById("configInfoContainer").innerHTML = "";
    selectedConfig = null;
    originalTitle = null;
    return;
  }
  try {
    const res = await fetch(`/api/configs/${encodeURIComponent(title)}`);
    if(!res.ok) throw new Error("Config not found");
    const config = await res.json();
    selectedConfig = config;
    originalTitle = config.title;

    const container = document.getElementById("configInfoContainer");
    container.innerHTML = `
      <div class="config-block" id="configBlock">
        <div><label>Title:</label> <span>${config.title}</span></div>
        <div><label>Mode:</label> <span>${config.mode}</span></div>
        <div><label>Event Type:</label> <span>${config.event_type}</span></div>
        <div><label>Payload:</label> <span>${config.payload_field}</span></div>
        <div><label>Description:</label> <span>${config.description||""}</span></div>
        ${config.extra_query?.image ? `<div><img src="data:${config.extra_query.image.contentType};base64,${config.extra_query.image.data}" style="max-width:200px;margin-top:10px;" id="currentImage"></div>` : ""}
        <div style="margin-top:10px;">
          <button onclick="deleteConfig()">Delete</button>
          <button class="update-btn" onclick="enableUpdate()">Update</button>
        </div>
      </div>`;
  } catch(err){ console.error(err); }
}

/* ---------- CREATE CONFIG ---------- */
async function createNewConfig(){
  const title = document.getElementById("newTitle").value.trim();
  const mode = document.getElementById("newMode").value;
  const event_type = document.getElementById("newEventType").value;
  const payload_field = document.getElementById("newPayload").value.trim();
  const description = document.getElementById("newDescription").value.trim();
  const imageInput = document.getElementById("newImage");

  if(!title||!mode||!event_type||!payload_field) return alert("All fields are required");

  const formData = new FormData();
  formData.append("title", title);
  formData.append("mode", mode);
  formData.append("event_type", event_type);
  formData.append("payload_field", payload_field);
  formData.append("description", description);
  if(imageInput.files[0]) formData.append("image", imageInput.files[0]);

  const res = await fetch("/api/configs",{method:"POST", body:formData});
  const result = await res.json();
  if(!res.ok) return alert(result.error);

  document.getElementById("newTitle").value="";
  document.getElementById("newPayload").value="";
  document.getElementById("newDescription").value="";
  document.getElementById("newMode").value="session";
  document.getElementById("newEventType").value="";
  document.getElementById("newImage").value="";

  await loadDropdowns();
}

/* ---------- DELETE CONFIG ---------- */
async function deleteConfig(){
  if(!selectedConfig) return;
  if(!confirm(`Delete "${selectedConfig.title}"?`)) return;
  await fetch(`/api/configs/${encodeURIComponent(selectedConfig.title)}`, {method:"DELETE"});
  selectedConfig=null; originalTitle=null;
  document.getElementById("configInfoContainer").innerHTML="";
  await loadDropdowns();
}

/* ---------- ENABLE UPDATE ---------- */
function enableUpdate() {
  if (!selectedConfig) return;

  const container = document.getElementById("configBlock");
  container.innerHTML = `
    <div><label>Title:</label> <input type="text" id="updateTitle" value="${selectedConfig.title}"></div>
    <div><label>Mode:</label>
      <select id="updateMode">
        <option value="session" ${selectedConfig.mode==="session"?"selected":""}>session</option>
        <option value="event" ${selectedConfig.mode==="event"?"selected":""}>event</option>
      </select>
    </div>
    <div><label>Event Type:</label>
      <select id="updateEventType"></select>
    </div>
    <div><label>Payload:</label> <input type="text" id="updatePayload" value="${selectedConfig.payload_field}"></div>
    <div><label>Description:</label> <textarea id="updateDescription" rows="4" maxlength="200">${selectedConfig.description||""}</textarea></div>
    <div>
      <label>Current Image:</label>
      ${selectedConfig.extra_query?.image ? `<div><img src="data:${selectedConfig.extra_query.image.contentType};base64,${selectedConfig.extra_query.image.data}" style="max-width:200px;margin-top:10px;" id="currentImage"></div>` : "No image"}
    </div>
    <div><label>Replace Image:</label> <input type="file" id="updateImage" accept="image/*"></div>
    <div style="margin-top:10px;">
      <button onclick="cancelUpdate()">Cancel</button>
      <button class="update-btn" onclick="submitUpdate()">Save</button>
    </div>
  `;

  // Populate event type dropdown
  fetchEventTypes().then(types => {
    const select = document.getElementById("updateEventType");
    select.innerHTML = '<option value="" disabled>-- Select an event type --</option>';
    types.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      if (t === selectedConfig.event_type) opt.selected = true;
      select.appendChild(opt);
    });
  });
}

/* ---------- SUBMIT UPDATE ---------- */
async function submitUpdate() {
  const title = document.getElementById("updateTitle").value.trim();
  const mode = document.getElementById("updateMode").value;
  const event_type = document.getElementById("updateEventType").value;
  const payload_field = document.getElementById("updatePayload").value.trim();
  const description = document.getElementById("updateDescription").value.trim();
  const imageInput = document.getElementById("updateImage");

  if (!title || !mode || !event_type || !payload_field) return alert("All fields are required");

  const formData = new FormData();
  formData.append("title", title);
  formData.append("mode", mode);
  formData.append("event_type", event_type);
  formData.append("payload_field", payload_field);
  formData.append("description", description);
  if (imageInput.files[0]) formData.append("image", imageInput.files[0]);

  const res = await fetch(`/api/configs/${encodeURIComponent(originalTitle)}`, { method: "PUT", body: formData });
  const result = await res.json();
  if (!res.ok) return alert(result.error);

  selectedConfig = null;
  originalTitle = null;
  document.getElementById("configInfoContainer").innerHTML = "";
  await loadDropdowns();
}

/* ---------- CANCEL UPDATE ---------- */
function cancelUpdate() {
  showConfigInfo(selectedConfig.title);
}
</script>

</body>
</html>
