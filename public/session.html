<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session Viewer</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/session.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div id="tooltip" class="tooltip"></div>    

<header>
    <div class="navbar">
        <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
        <a href="data.html">Event DataPool</a>
        <a href="session.html">Sessions</a>
    </div>
</header>

<h1>Session Viewer</h1>

<form id="filters">
    <div>
        <strong style="display:block; margin-bottom:8px;">Time Interval:</strong>
        <label>Start Time:
            <input type="datetime-local" id="startTime">
        </label>
        <label>End Time:
            <input type="datetime-local" id="endTime">
        </label>

        <button type="button" class="preset-btn" data-range="10">Last 10 days</button>
        <button type="button" class="preset-btn" data-range="30">Last 1 month</button>
        <button type="button" class="preset-btn" data-range="all">All time</button>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Event Type:</strong>
            <select id="eventTypeSelect"><option value="">Select Event Type</option></select>
        </label>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Employee / Employee Type:</strong>
            <select id="employeeSelect"><option value="">All</option></select>
        </label>
    </div>

    <button type="submit" id="applyButton">Apply</button>
</form>

<div id="descriptionImageContainer"></div>

<div id="tableContainerWrapper">
  <div id="tableContainer">
    <table id="bigTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="timelineContainer" style="display:none; margin:20px 0;">
  <h3>Session Timeline</h3>
  <div id="timelineSummary"></div>
  <div class="timeline-wrapper">
    <div id="timeline" class="timeline"></div>
  </div>
  <div style="margin-bottom:10px;">
    <button id="zoomOutBtn">- Zoom Out</button>
    <button id="zoomInBtn">+ Zoom In</button>
    <button id="zoomResetBtn">Reset Zoom</button>
  </div>
  <div id="timelineLegend" class="legend"></div>
</div>

<div id="multiChartContainer" class="chart-container"></div>

<footer>
  © TICRA foundation
</footer>

<!-- Download CSV Button -->
<span id="downloadBtn" style="display:none;">
  <img src="/images/Excel-Logo.png" alt="Excel" width="100" title="Download CSV">
</span>

<!-- Inline module script -->
<script type="module">
import { setDefaultDateRange, fetchJson, createCell, sortTableByRow, applyStickyColumns, formatSecondsToHMS, renderBarChart, downloadTableCSV } from './scripts/utils.js';
import { renderSessionTable } from './scripts/sessionTable.js';
import { renderSessionCharts } from './scripts/sessionCharts.js';
import { loadTimeline } from './scripts/timeline.js';

const STATE = {
    fullSessions: [],
    activeUsers: [],
    userOrder: [],
    sessionOrder: [],
    rowSortStates: {}
};

const eventTypeSelect = document.getElementById("eventTypeSelect");
const employeeSelect = document.getElementById("employeeSelect");
const startInput = document.getElementById("startTime");
const endInput = document.getElementById("endTime");
const applyButton = document.getElementById("applyButton");
const tooltip = document.getElementById('tooltip');
const downloadBtn = document.getElementById('downloadBtn');

downloadBtn.addEventListener('click', () => downloadTableCSV());

// Set default date range
setDefaultDateRange('startTime','endTime',10);

// Load dropdowns
async function initDropdowns() {
    const eventTypes = await fetchJson('/sessionTypes');
    eventTypeSelect.innerHTML = '<option value="">Select Event Type</option>';
    eventTypes.forEach(e => { const opt = document.createElement("option"); opt.value = e; opt.textContent = e; eventTypeSelect.appendChild(opt); });

    const employeeTypes = await fetchJson('/employeeTypes');
    const users = await fetchJson('/users');
    employeeSelect.innerHTML = `<option value="">All</option>`;

    if(employeeTypes.length){
        const group = document.createElement("optgroup"); group.label="Employee Types";
        employeeTypes.forEach(t => { const opt = document.createElement("option"); opt.value = t; opt.textContent = t; opt.dataset.type="employeeType"; group.appendChild(opt); });
        employeeSelect.appendChild(group);
    }
    if(users.length){
        const group = document.createElement("optgroup"); group.label="Employees";
        [...new Set(users)].forEach(u => { const opt = document.createElement("option"); opt.value = u; opt.textContent = u; opt.dataset.type="user"; group.appendChild(opt); });
        employeeSelect.appendChild(group);
    }
}
initDropdowns();

// Preset buttons
function formatDateTimeLocal(date) {
    const pad = n => n.toString().padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function setPresetRange(range) {
    const now = new Date();
    let start;
    if (range === 'all') start = new Date('2026-01-01T00:00:00');
    else { start = new Date(); if(range===30) start.setMonth(now.getMonth()-1); else start.setDate(now.getDate()-range); }
    startInput.value = formatDateTimeLocal(start);
    endInput.value = formatDateTimeLocal(now);
}
document.querySelectorAll('.preset-btn').forEach(btn => btn.addEventListener('click', () => setPresetRange(btn.dataset.range === 'all' ? 'all' : parseInt(btn.dataset.range))));

// Apply button
applyButton.addEventListener('click', async e => {
    e.preventDefault();
    const selectedConfig = eventTypeSelect.value; if(!selectedConfig) return;
    const selectedEmployee = employeeSelect.value || null;
    const selectedOption = employeeSelect.querySelector(`option[value="${selectedEmployee}"]`);
    const isEmployeeType = selectedOption?.dataset.type==='employeeType';

    const startTime = startInput.value || new Date(Date.now()-30*24*60*60*1000).toISOString();
    const endTime = endInput.value || new Date().toISOString();

    const params = new URLSearchParams();
    params.append('configTitle', selectedConfig);
    params.append('startTime', startTime);
    params.append('endTime', endTime);
    if(isEmployeeType && selectedEmployee) params.append('employee_type', selectedEmployee);
    else if(selectedEmployee) params.append('user_name', selectedEmployee);

    try {
        const data = await fetchJson(`/session?${params.toString()}`);
        STATE.fullSessions = data.sessions || [];
        renderAllSessions(selectedEmployee, isEmployeeType);
    } catch(err) { console.error(err); alert("Failed to load sessions."); STATE.fullSessions=[]; renderAllSessions(); }
});

function renderAllSessions(selectedEmployee=null, isEmployeeType=false){
    const sessions = STATE.fullSessions;
    if(!sessions.length){
        renderSessionTable({ sessions: [], state: STATE });
        renderSessionCharts({ sessions: [], state: STATE });
        downloadBtn.style.display = 'none';
        return;
    }

    const perUser = {};
    sessions.forEach(s => { const user = s.user_name||"Unknown"; if(!perUser[user]) perUser[user]=[]; perUser[user].push(s); });
    const tabs = [...new Set(sessions.map(s=>s.tab))].sort();

    renderSessionTable({ sessions, perUser, tabs, selectedEmployee, isEmployeeType, state: STATE, loadTimeline });
    renderSessionCharts({ sessions, perUser, tabs, selectedEmployee, isEmployeeType, state: STATE });
    downloadBtn.style.display = 'block';
}

async function loadDescriptionTooltip(configTitle) {
    if (!configTitle) return;
    try {
        const configQuery = await fetchJson(`/api/configs/${encodeURIComponent(configTitle)}`);
        const title = configQuery.title ?? configTitle;
        const description = configQuery.description ?? '';
        const imgObj = configQuery.extra_query?.image;

        let html = `<strong>${title}</strong>`;
        if (description) html += `<div>${description}</div>`;
        if (imgObj?.data) html += `<img src="data:${imgObj.contentType};base64,${imgObj.data}" style="margin-top:6px; max-width:300px; max-height:200px;">`;

        tooltip.innerHTML = html;
    } catch (e) {
        tooltip.innerHTML = `<strong>${configTitle}</strong><div>No description available</div>`;
    }
}
</script>

</body>
</html>
