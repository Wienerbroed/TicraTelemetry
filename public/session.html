<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session Viewer</title>
<link rel="stylesheet" href="styles/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="scripts/utils.js"></script>
<style>
/* Timeline styles */
.timeline-wrapper {
    margin-top: 20px;
    width: 100%;
    max-width: 1200px;
    overflow-x: auto;
    border-top: 3px solid #ccc;
    padding-top: 20px;
    position: relative;
}
.timeline {
    display: flex;
    align-items: flex-start;
    height: 80px;
    min-width: 1200px;
    width: max-content;
}
.event-box { 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    height:60px; 
    color:white; 
    font-size:12px; 
    border-radius:6px; 
    margin-right:2px; 
    cursor:pointer; 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
    transition:opacity 0.2s;
}
.event-box:hover { opacity:0.85; }

#timelineSummary { text-align: left; margin-bottom: 15px; }

#timelineLegend {
    display: flex;            
    gap: 40px;                 
    align-items: flex-start;   
}

.legend-column {
    display: flex;
    flex-direction: column;    
    align-items: flex-start;   
    gap: 6px;
}

.legend-title {
    font-weight: bold;
    margin-bottom: 6px;
}

.legend-item {
    display: flex;             
    align-items: center;       
    gap: 6px;                
}

.legend-color {
    width: 15px;
    height: 15px;
    border-radius: 3px;
    flex-shrink: 0;            
}

.legend-text {
    font-size: 13px;
    text-align: left;
}

.legend { margin-top:25px; display:flex; gap:40px; }


/* Description Image */
#descriptionImageContainer {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:16px;
    margin:20px 0;
}
.description-image-block {
    max-width: 400px;
    border: 1px solid #ccc;
    padding: 12px;
    border-radius: 6px;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}
.description-image-block img {
    max-width: 400px;
    max-height: 180px;
    margin-top: 8px;
    object-fit: contain;
}
.description-image-block p {
    font-size: 0.95rem;
    margin: 0;
}

/* Table wrapper for download button */
#tableContainerWrapper {
    margin-top: 20px;
    text-align: center;
}
#downloadBtn {
    cursor: pointer;
    opacity: 0.8;
    margin-top: 10px;
    display: none;
    transition: opacity 0.2s;
}
#downloadBtn:hover { opacity: 1; }

/* Tooltip */
.tooltip {
  position: absolute;
  background: rgba(255,255,255,0.95);
  border: 1px solid #aaa;
  border-radius: 6px;
  padding: 8px;
  font-size: 12px;
  max-width: 220px;
  z-index: 9999;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.tooltip img {
  max-width: 200px;
  max-height: 120px;
  display: block;
  margin-top: 4px;
}

/* Operation column alternating colors */
tr.eventtype-row-white td.operation-cell { background-color: #fff; }
tr.eventtype-row-gray td.operation-cell { background-color: #dcdcdc; }

/* Hover highlight for operation */
tr.sortable:hover td.operation-cell { background-color: rgba(252, 199, 93, 0.5) !important; font-weight: bold; }

</style>
</head>
<body>

<header>
    <div class="navbar">
        <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
        <a href="data.html">Event DataPool</a>
        <a href="session.html">Sessions</a>
    </div>
</header>

<h1>Session Viewer</h1>

<form id="filters">
    <div>
        <strong style="display:block; margin-bottom:8px;">Time Interval:</strong>
        <label>Start Time:
            <input type="datetime-local" id="startTime">
        </label>
        <label>End Time:
            <input type="datetime-local" id="endTime">
        </label>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Event Type:</strong>
            <select id="eventTypeSelect"><option value="">Select Event Type</option></select>
        </label>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Employee / Employee Type:</strong>
            <select id="employeeSelect"><option value="">All</option></select>
        </label>
    </div>

    <button type="submit" id="applyButton">Apply</button>
</form>

<div id="descriptionImageContainer"></div>

<div id="tableContainerWrapper">
  <div id="tableContainer">
    <table id="bigTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip" class="tooltip"></div>

<div id="timelineContainer" style="display:none; margin:20px 0;">
  <h3>Session Timeline</h3>
  <div id="timelineSummary"></div>
  <div class="timeline-wrapper">
    <div id="timeline" class="timeline"></div>
  </div>
  <div id="timelineLegend" class="legend"></div>
</div>

<div id="multiChartContainer" class="chart-container"></div>

<footer>© TICRA foundation</footer>

<script type="module">
import { 
  COLORS, setDefaultDateRange, fetchJson, createCell, sortTableByRow, renderBarChart, 
  applyStickyColumns, applyColumnHeatmap, formatSecondsToHMS, downloadTableCSV
} from './scripts/utils.js';

const STATE = { fullSessions: [], activeUsers: [], userOrder: [], sessionOrder: [], rowSortStates: {} };
const eventTypeSelect = document.getElementById("eventTypeSelect");
const employeeSelect = document.getElementById("employeeSelect");
const startInput = document.getElementById("startTime");
const endInput = document.getElementById("endTime");
const applyButton = document.getElementById("applyButton");
const descriptionImageContainer = document.getElementById('descriptionImageContainer');
const timelineContainer = document.getElementById('timelineContainer');
const timelineSummary = document.getElementById('timelineSummary');
const timelineDiv = document.getElementById('timeline');
const timelineLegend = document.getElementById('timelineLegend');

// Download button
const downloadBtn = document.createElement('span');
downloadBtn.id = 'downloadBtn';
downloadBtn.innerHTML = '<img src="/images/Excel-Logo.png" alt="Excel" width="100">';
downloadBtn.title = 'Download CSV';
downloadBtn.addEventListener('click', () => { downloadTableCSV(); });
document.getElementById('tableContainerWrapper').appendChild(downloadBtn);

// Tooltip reference
const tooltip = document.getElementById('tooltip');

// Initialize default date range
setDefaultDateRange('startTime','endTime',10);

// Load dropdowns
async function initDropdowns() {
    const eventTypes = await fetchJson('/sessionTypes');
    eventTypeSelect.innerHTML = '<option value="">Select Event Type</option>';
    eventTypes.forEach(e => { const opt = document.createElement('option'); opt.value=e; opt.textContent=e; eventTypeSelect.appendChild(opt); });

    const employeeTypes = await fetchJson('/employeeTypes');
    const users = await fetchJson('/users');
    employeeSelect.innerHTML = `<option value="">All</option>`;
    
    if(employeeTypes.length){
        const group = document.createElement("optgroup"); group.label="Employee Types";
        employeeTypes.forEach(t=>{ const opt=document.createElement("option"); opt.value=t; opt.textContent=t; opt.dataset.type="employeeType"; group.appendChild(opt); });
        employeeSelect.appendChild(group);
    }
    if(users.length){
        const group=document.createElement("optgroup"); group.label="Employees";
        [...new Set(users)].forEach(u=>{ const opt=document.createElement("option"); opt.value=u; opt.textContent=u; opt.dataset.type="user"; group.appendChild(opt); });
        employeeSelect.appendChild(group);
    }
}
initDropdowns();

// Load description and images
async function loadDescriptionImageBoxes(configTitle){
    descriptionImageContainer.innerHTML='';
    if(!configTitle) return;
    try{
        const configQuery = await fetchJson(`/api/configs/${encodeURIComponent(configTitle)}`);
        const description = configQuery.description ?? '';
        const imgObj = configQuery.extra_query?.image;
        const block = document.createElement("div");
        block.classList.add("description-image-block");
        if(description){ const p=document.createElement("p"); p.textContent=description; block.appendChild(p); }
        if(imgObj?.data){ const img=document.createElement("img"); img.src=`data:${imgObj.contentType};base64,${imgObj.data}`; block.appendChild(img);}
        descriptionImageContainer.appendChild(block);
        descriptionImageContainer.querySelectorAll('.description-image-block').forEach((b,idx)=>b.style.background=idx%2===0?'#fff':'#eee');
    } catch(e){ console.warn("No config found:", configTitle); }
}

// Apply filters
applyButton.addEventListener('click', async e=>{
    e.preventDefault();
    const selectedConfig = eventTypeSelect.value;
    if(!selectedConfig) return;
    const selectedEmployee = employeeSelect.value || null;
    const selectedOption = employeeSelect.querySelector(`option[value="${selectedEmployee}"]`);
    const isType = selectedOption?.dataset.type==='employeeType';
    await loadDescriptionImageBoxes(selectedConfig);

    const startTime = startInput.value || new Date(Date.now()-30*24*60*60*1000).toISOString();
    const endTime = endInput.value || new Date().toISOString();
    const params = new URLSearchParams();
    params.append('configTitle', selectedConfig);
    params.append('startTime', startTime);
    params.append('endTime', endTime);
    if(isType && selectedEmployee) params.append('employee_type', selectedEmployee);
    else if(selectedEmployee) params.append('user_name', selectedEmployee);

    try{
        const data = await fetchJson(`/session?${params.toString()}`);
        STATE.fullSessions = data.sessions || [];
        renderTableAndCharts(selectedEmployee, isType);
    }catch(err){
        console.error(err); alert("Failed to load sessions.");
        STATE.fullSessions=[]; renderTableAndCharts();
    }
});

// Render table and charts
function renderTableAndCharts(selectedEmployee=null,isType=false){
    const sessions = STATE.fullSessions;
    const table=document.getElementById('bigTable');
    if(!sessions.length){
        table.querySelector('thead').innerHTML='';
        table.querySelector('tbody').innerHTML='';
        document.getElementById('multiChartContainer').innerHTML='';
        toggleDownloadButton(false);
        timelineContainer.style.display='none';
        return;
    }

    const perUser={};
    sessions.forEach(s=>{ const user=s.user_name||"Unknown"; if(!perUser[user]) perUser[user]=[]; perUser[user].push(s); });

    let columns=[];
    if(selectedEmployee && !isType){ STATE.sessionOrder=[...new Set(sessions.map(s=>s.session_id))].sort(); columns=STATE.sessionOrder; }
    else { STATE.activeUsers=Object.keys(perUser).sort(); STATE.userOrder=[...STATE.activeUsers]; columns=STATE.userOrder; }

    const tabs=[...new Set(sessions.map(s=>s.tab))].sort();
    drawTable(perUser,tabs,selectedEmployee,isType);
    drawCharts(perUser,tabs,columns,selectedEmployee,isType);
    toggleDownloadButton(true);
}

// Toggle download button
function toggleDownloadButton(show){ downloadBtn.style.display=show?'block':'none'; }

// Color mapping
const colorMap={};
function getColor(eventType,payload){ const key=payload?`${eventType}-${JSON.stringify(payload)}`:`${eventType}-null`; if(!colorMap[key]){ const hue=(Object.keys(colorMap).length*100)%360; colorMap[key]=payload?`hsl(${hue},50%,40%)`:"#888"; } return colorMap[key]; }

// Draw table with alternating operation-cell colors & tooltips
function drawTable(perUser, tabs, selectedEmployee, isType) {
    const table = document.getElementById('bigTable');
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');
    thead.innerHTML = '';
    tbody.innerHTML = '';

    // Determine columns (users or sessions)
    let columns = [];
    if (selectedEmployee && !isType) { columns = [...new Set(STATE.fullSessions.map(s => s.session_id))].sort(); }
    else { columns = STATE.userOrder; }

    // Build table header
    const headerRow = document.createElement('tr');
    ['Operation', 'AVERAGE', 'TOTAL', ...columns].forEach((text, idx) => {
        const th = document.createElement('th');
        th.classList.add('rotate', 'sticky');
        if(idx===0) th.style.position='relative';
        const div = document.createElement('div'); div.textContent=text; th.appendChild(div);
        headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);

    // Compute column max for heatmap
    const columnMax = {};
    columns.forEach((col) => {
        let maxVal = 0;
        tabs.forEach(tab => {
            let val = selectedEmployee && !isType ?
                STATE.fullSessions.filter(s => s.tab === tab && s.session_id === col).reduce((a,b)=>a+b.durationSeconds,0)
                : perUser[col]?.filter(s=>s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0) || 0;
            if(val>maxVal) maxVal=val;
        });
        columnMax[col]=maxVal;
    });

    function getHeatmapColor(val, maxVal) {
        if(maxVal===0) return { bg:'white', color:'#000' };
        const intensity=Math.pow(val/maxVal,0.5);
        const hue=120;
        return { bg:`hsl(${hue},70%,${100-intensity*60}%)`, color: intensity>0.6?'#fff':'#000' };
    }

    // Build table body with alternating row colors & tooltips
    tabs.forEach((tab, idx) => {
        const tr = document.createElement('tr');
        tr.dataset.tab=tab;
        tr.classList.add('sortable', idx%2===0?'eventtype-row-white':'eventtype-row-gray');

        // Operation cell
        const opCell = createCell(tab,false,null,'operation-cell');
        tr.appendChild(opCell);

        // Tooltip for operation cell
        opCell.addEventListener('mouseenter', async () => {
            tooltip.innerHTML=''; tooltip.style.display='block';
            let config={};
            try{ config = await fetchJson(`/api/configs/${encodeURIComponent(tab)}`); } catch(e){}
            const titleP = document.createElement('p'); titleP.textContent=tab; titleP.style.fontWeight='bold'; titleP.style.margin='0 0 4px 0'; tooltip.appendChild(titleP);
            if(config.description){ const p=document.createElement('p'); p.textContent=config.description; p.style.margin='0 0 4px 0'; tooltip.appendChild(p); }
            if(config.extra_query?.image?.data){ const img=document.createElement('img'); img.src=`data:${config.extra_query.image.contentType};base64,${config.extra_query.image.data}`; tooltip.appendChild(img);}
            const tabP=document.createElement('p'); tabP.textContent=tab; tabP.style.margin='4px 0 0 0'; tooltip.appendChild(tabP);
            const rect = opCell.getBoundingClientRect();
            tooltip.style.top = `${rect.top - tooltip.offsetHeight - 6 + window.scrollY}px`;
            tooltip.style.left = `${rect.right - tooltip.offsetWidth + window.scrollX}px`;
        });
        opCell.addEventListener('mouseleave',()=>{ tooltip.style.display='none'; });

        // Summary cells
        const totalsArray = columns.map(col => selectedEmployee && !isType ?
            STATE.fullSessions.filter(s => s.tab===tab && s.session_id===col).reduce((a,b)=>a+b.durationSeconds,0)
            : perUser[col]?.filter(s=>s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0) || 0 );
        const total = totalsArray.reduce((a,b)=>a+b,0);
        const avg = totalsArray.length? total/totalsArray.length : 0;
        tr.appendChild(createCell(formatSecondsToHMS(avg),false,null,'summary-cell'));
        tr.appendChild(createCell(formatSecondsToHMS(total),false,null,'summary-cell'));

        // User/session cells with heatmap
        totalsArray.forEach((val,i)=>{
            const td = createCell(formatSecondsToHMS(val),false,null,'user-cell');
            td.dataset.sort=val;
            const {bg,color}=getHeatmapColor(val,columnMax[columns[i]]);
            td.style.backgroundColor=bg; td.style.color=color;
            tr.appendChild(td);
        });

        // Row click for sorting
        tr.addEventListener('click',()=>sortTableByRow(table,tr,STATE.rowSortStates,3));

        tbody.appendChild(tr);
    });

    applyStickyColumns(table,3);
}



// Draw charts
function drawCharts(perUser,tabs,columns,selectedEmployee,isType){
    const chartContainer=document.getElementById('multiChartContainer'); chartContainer.innerHTML=''; chartContainer.style.display='grid'; chartContainer.style.gridTemplateColumns='repeat(2,1fr)'; chartContainer.style.gap='20px';
    columns.forEach(col=>{
        const chartWrapper=document.createElement('div'); chartWrapper.style.border='1px solid #ddd'; chartWrapper.style.borderRadius='6px'; chartWrapper.style.padding='10px'; chartWrapper.style.background='#fafafa'; chartWrapper.style.display='flex'; chartWrapper.style.flexDirection='column'; chartWrapper.style.alignItems='center';
        const title=document.createElement('strong'); title.textContent=col; chartWrapper.appendChild(title);
        const toggleWrapper=document.createElement('label'); toggleWrapper.style.fontSize='12px'; toggleWrapper.style.margin='5px 0'; toggleWrapper.innerHTML=`<input type="checkbox"> Show as %`; chartWrapper.appendChild(toggleWrapper);
        const percentageCheckbox=toggleWrapper.querySelector('input');
        const canvas=document.createElement('canvas'); canvas.style.width='100%'; canvas.style.height='260px'; chartWrapper.appendChild(canvas);
        chartContainer.appendChild(chartWrapper);
        const renderChart=()=>{
            const labels=tabs;
            let data=tabs.map(tab=>{
                if(selectedEmployee && !isType){ return STATE.fullSessions.filter(s=>s.session_id===col && s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0);}
                else{ return perUser[col]?.filter(s=>s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0)||0;}
            });
            if(percentageCheckbox.checked){ const total=data.reduce((a,b)=>a+b,1); data=data.map(d=>(d/total*100).toFixed(2)); }
            renderBarChart(canvas,labels,data,COLORS.slice(0,labels.length),{
                responsive:true,
                animation:false,
                maintainAspectRatio:false,
                interaction:{mode:'index',intersect:false},
                plugins:{legend:{display:false}},
                scales:{y:{beginAtZero:true,max:percentageCheckbox.checked?100:undefined,title:{display:true,text:percentageCheckbox.checked?'Percentage (%)':'Seconds'}}}
            });
        };
        percentageCheckbox.addEventListener('change',renderChart);
        renderChart();
    });
}

// Timeline
async function loadTimeline(sessionId){
    timelineContainer.style.display='block';
    timelineSummary.innerHTML=timelineDiv.innerHTML=timelineLegend.innerHTML='';
    Object.keys(colorMap).forEach(k=>delete colorMap[k]);
    const response=await fetch(`/sessionTimeline?sessionId=${sessionId}`);
    const data=await response.json();
    if(!data.timeline?.length){ timelineSummary.innerHTML='<p>No events found for this session.</p>'; return; }
    const totalDuration=data.totalDurationSeconds||1;
    timelineSummary.innerHTML=`<div class="summary">
      <strong>User:</strong> ${data.user_name}<br/>
      <strong>Employee Type:</strong> ${data.employee_type}<br/>
      <strong>Total Events:</strong> ${data.totalEvents}<br/>
      <strong>Total Duration:</strong> ${Math.round(totalDuration)} seconds
    </div>`;
    const MIN_TOTAL_WIDTH=1200; const timelineTotalWidth=Math.max(data.timeline.length*50,MIN_TOTAL_WIDTH);
    data.timeline.forEach(event=>{
        const box=document.createElement('div'); box.className='event-box';
        box.style.width=(event.durationSeconds/totalDuration)*timelineTotalWidth+'px';
        box.style.background=getColor(event.event_type,event.payload);
        box.title=`Event: ${event.event_type}\nDuration: ${Math.round(event.durationSeconds)} sec\nTime: ${new Date(event.time_stamp).toLocaleTimeString()}\nPayload: ${JSON.stringify(event.payload||{})}`;
        timelineDiv.appendChild(box);
    });
    const grouped={};
    Object.keys(colorMap).forEach(key=>{ const [type,payloadStr]=key.split(/-(.+)/); if(!grouped[type]) grouped[type]=[]; grouped[type].push({key,payloadStr,color: colorMap[key]}); });
Object.keys(grouped).forEach(type=>{
    const column=document.createElement('div'); column.className='legend-column';
    const title=document.createElement('div'); title.className='legend-title'; title.innerText=type; column.appendChild(title);
    grouped[type].forEach(item=>{
        const itemDiv=document.createElement('div'); itemDiv.className='legend-item';
        const colorBox=document.createElement('div'); colorBox.className='legend-color'; colorBox.style.background=item.color;
        const label=document.createElement('span'); label.innerText=item.payloadStr==='null'?"No payload":item.payloadStr;
        itemDiv.appendChild(colorBox); itemDiv.appendChild(label);
        column.appendChild(itemDiv);
    });
    timelineLegend.appendChild(column);
});
timelineContainer.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
