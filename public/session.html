<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session Viewer</title>
<link rel="stylesheet" href="styles/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="scripts/utils.js"></script>
<style>
/* TIMELINE STYLES */
.timeline-wrapper {
    margin-top: 20px;
    width: 100%;
    max-width: 1200px;
    overflow-x: auto;
    border-top: 3px solid #ccc;
    padding-top: 20px;
    position: relative;
}
.timeline {
    display: flex;
    align-items: flex-start;
    height: 80px;
    min-width: 1200px;
    width: max-content;
}
.event-box { 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    height:60px; 
    color:white; 
    font-size:12px; 
    border-radius:6px; 
    margin-right:2px; 
    cursor:pointer; 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
    transition:opacity 0.2s;
}
.event-box:hover { opacity:0.85; }

#timelineSummary { text-align: center; margin-bottom: 15px; }
#timelineLegend {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
    text-align: center;
}
.legend { margin-top:25px; display:flex; gap:40px; }
.legend-column { display:flex; flex-direction: column; align-items:center; gap:8px; }
.legend-title { font-weight:bold; margin-bottom:6px; }
.legend-item { display:flex; align-items:center; font-size:13px; }
.legend-color { width:15px; height:15px; margin-right:6px; border-radius:3px; }

/* DESCRIPTION + IMAGE BLOCKS */
#descriptionImageContainer {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:16px;
    margin:20px 0;
}
.description-image-block {
    max-width: 400px;
    border: 1px solid #ccc;
    padding: 12px;
    border-radius: 6px;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}
.description-image-block img {
    max-width: 400px;
    max-height: 180px;
    margin-top: 8px;
    object-fit: contain;
}
.description-image-block p {
    font-size: 0.95rem;
    margin: 0;
}
</style>
</head>
<body>

<header>
    <div class="navbar">
        <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
        <a href="data.html">Event DataPool</a>
        <a href="session.html">Sessions</a>
    </div>
</header>

<h1>Session Viewer</h1>

<form id="filters">
    <div>
        <strong style="display:block; margin-bottom:8px;">Time Interval:</strong>
        <label>Start Time:
            <input type="datetime-local" id="startTime">
        </label>
        <label>End Time:
            <input type="datetime-local" id="endTime">
        </label>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Event Type:</strong>
            <select id="eventTypeSelect"><option value="">Select Event Type</option></select>
        </label>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Employee / Employee Type:</strong>
            <select id="employeeSelect"><option value="">All</option></select>
        </label>
    </div>

    <button type="submit" id="applyButton">Apply</button>
</form>

<!-- DESCRIPTION + IMAGE CONTAINER -->
<div id="descriptionImageContainer"></div>

<div id="tableContainerWrapper">
  <div id="tableContainer">
    <table id="bigTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <button id="downloadBtn" style="
      margin:20px auto;
      padding:4px 8px;
      font-size:14px;
      cursor:pointer;
      display:none;
  ">Download CSV</button>
</div>

<div id="timelineContainer" style="display:none; margin:20px 0;">
  <h3>Session Timeline</h3>
  <div id="timelineSummary"></div>
  <div class="timeline-wrapper">
    <div id="timeline" class="timeline"></div>
  </div>
  <div id="timelineLegend" class="legend"></div>
</div>

<div id="multiChartContainer" class="chart-container"></div>

<footer>
  © TICRA foundation
</footer>

<script type="module">
import { 
  COLORS, setDefaultDateRange, fetchJson, createCell, sortTableByRow, renderBarChart, 
  applyStickyColumns, applyColumnHeatmap, formatSecondsToHMS, u_type_matches
} from './scripts/utils.js';

const STATE = {
    fullSessions: [], activeUsers: [], userOrder: [], sessionOrder: [], rowSortStates: {}
};

const eventTypeSelect = document.getElementById("eventTypeSelect");
const employeeSelect = document.getElementById("employeeSelect");
const startInput = document.getElementById("startTime");
const endInput = document.getElementById("endTime");
const applyButton = document.getElementById("applyButton");
const downloadBtn = document.getElementById("downloadBtn");
const descriptionImageContainer = document.getElementById('descriptionImageContainer');

const timelineContainer = document.getElementById('timelineContainer');
const timelineSummary = document.getElementById('timelineSummary');
const timelineDiv = document.getElementById('timeline');
const timelineLegend = document.getElementById('timelineLegend');

setDefaultDateRange('startTime','endTime',10);

// ------------------------
// INITIALIZE DROPDOWNS
// ------------------------
async function initDropdowns() {
    const eventTypes = await fetchJson('/sessionTypes');
    eventTypeSelect.innerHTML = '<option value="">Select Event Type</option>';
    eventTypes.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e;
        opt.textContent = e;
        eventTypeSelect.appendChild(opt);
    });

    const employeeTypes = await fetchJson('/employeeTypes');
    const users = await fetchJson('/users');
    employeeSelect.innerHTML = `<option value="">All</option>`;
    
    if(employeeTypes.length){
        const group = document.createElement("optgroup");
        group.label = "Employee Types";
        employeeTypes.forEach(t => {
            const opt = document.createElement("option");
            opt.value = t;
            opt.textContent = t;
            opt.dataset.type = "employeeType";
            group.appendChild(opt);
        });
        employeeSelect.appendChild(group);
    }

    if(users.length){
        const uniqueUsers = [...new Set(users)];
        const group = document.createElement("optgroup");
        group.label = "Employees";
        uniqueUsers.forEach(u => {
            const opt = document.createElement("option");
            opt.value = u;
            opt.textContent = u;
            opt.dataset.type = "user";
            group.appendChild(opt);
        });
        employeeSelect.appendChild(group);
    }
}

initDropdowns();

// ------------------------
// LOAD DESCRIPTION + IMAGE BOXES
// ------------------------
async function loadDescriptionImageBoxes(eventType) {
    descriptionImageContainer.innerHTML = '';
    if(!eventType) return;

    try {
        const configQuery = await fetchJson(`/api/configs/${encodeURIComponent(eventType)}`);
        const description = configQuery.description ?? '';
        const imgObj = configQuery.extra_query?.image;

        const block = document.createElement("div");
        block.classList.add("description-image-block");

        if(description){
            const descElem = document.createElement("p");
            descElem.textContent = description;
            block.appendChild(descElem);
        }

        if(imgObj?.data){
            const imgElem = document.createElement("img");
            imgElem.src = `data:${imgObj.contentType};base64,${imgObj.data}`;
            block.appendChild(imgElem);
        }

        descriptionImageContainer.appendChild(block);

        descriptionImageContainer.querySelectorAll('.description-image-block').forEach((b, idx)=>{
            b.style.background = idx % 2 === 0 ? '#fff' : '#eee';
        });

    } catch(err){
        console.warn("No config found for event type:", eventType);
    }
}

// ------------------------
// APPLY BUTTON: FETCH SESSIONS
// ------------------------
applyButton.addEventListener('click', async e=>{
    e.preventDefault();
    const selectedEvent = eventTypeSelect.value;
    if(!selectedEvent) return;

    const selectedEmployee = employeeSelect.value || null;
    const selectedOption = employeeSelect.querySelector(`option[value="${selectedEmployee}"]`);
    const isType = selectedOption?.dataset.type==='employeeType';

    loadDescriptionImageBoxes(selectedEvent);

    const params = new URLSearchParams();
    params.append('eventType', selectedEvent);
    if(startInput.value) params.append('startTime', startInput.value);
    if(endInput.value) params.append('endTime', endInput.value);
    if(isType) params.append('employee_type', selectedEmployee);
    else if(selectedEmployee) params.append('user_name', selectedEmployee);

    const url = `/session?${params.toString()}`;
    const data = await fetchJson(url);
    STATE.fullSessions = data.sessions || [];

    renderTableAndCharts(selectedEmployee, isType);
});

// ------------------------
// RENDER TABLE + CHARTS
// ------------------------
function renderTableAndCharts(selectedEmployee=null, isType=false){
    const sessions = STATE.fullSessions;
    const table = document.getElementById('bigTable');
    if(!sessions.length){
        table.querySelector('thead').innerHTML='';
        table.querySelector('tbody').innerHTML='';
        document.getElementById('multiChartContainer').innerHTML='';
        toggleDownloadButton(false);
        timelineContainer.style.display = 'none';
        return;
    }

    const perUser = {};
    sessions.forEach(s=>{
        const user = s.user_name || "Unknown";
        if(!perUser[user]) perUser[user]=[];
        perUser[user].push(s);
    });

    let columns = [];
    if(selectedEmployee && !isType){
        STATE.sessionOrder = [...new Set(sessions.map(s=>s.session_id))].sort();
        columns = STATE.sessionOrder;
    } else {
        STATE.activeUsers = Object.keys(perUser).sort();
        STATE.userOrder = [...STATE.activeUsers];
        columns = STATE.userOrder;
    }

    const tabs = [...new Set(sessions.map(s=>s.tab))].sort();
    drawTable(perUser, tabs, selectedEmployee, isType);
    drawCharts(perUser, tabs, columns, selectedEmployee, isType);
}

// ------------------------
// DRAW TABLE FUNCTION
// ------------------------
function drawTable(perUser, tabs, selectedEmployee, isType){
    const table = document.getElementById('bigTable');
    const thead = table.querySelector('thead');
    const tbody = table.querySelector('tbody');
    thead.innerHTML = '';
    tbody.innerHTML = '';

    let columns = [];
    if(selectedEmployee && !isType){
        columns = [...new Set(STATE.fullSessions.map(s=>s.session_id))].sort();
    } else {
        columns = STATE.userOrder;
    }

    // HEADER
    const headerRow = document.createElement('tr');
    ['Operation','AVERAGE','TOTAL',...columns].forEach((text, idx)=>{
        const th = document.createElement('th');
        th.classList.add('rotate','sticky');

        if(idx === 0) th.style.position = 'relative';

        const div = document.createElement('div');
        div.textContent = text;

        if(selectedEmployee && !isType && idx >= 3){ 
            div.style.cursor = "pointer";
            div.style.textDecoration = "underline";
            div.addEventListener('click', ()=> loadTimeline(text));
        }

        th.appendChild(div);

        if(idx >= 3) th.classList.add('user-cell');

        if(idx === 0){
            const downloadIcon = document.createElement('span');
            downloadIcon.innerHTML = '⬇';
            downloadIcon.title = 'Download CSV';
            downloadIcon.style.position = 'absolute';
            downloadIcon.style.top = '4px';
            downloadIcon.style.left = '6px';
            downloadIcon.style.fontSize = '12px';
            downloadIcon.style.cursor = 'pointer';
            downloadIcon.style.opacity = '0.6';
            downloadIcon.addEventListener('mouseenter', ()=> downloadIcon.style.opacity = '1');
            downloadIcon.addEventListener('mouseleave', ()=> downloadIcon.style.opacity = '0.6');

            downloadIcon.addEventListener('click', ()=> downloadTableCSV());
            th.appendChild(downloadIcon);
        }

        headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);

    // BODY ROWS
    tabs.forEach((tab, idx)=>{
        const tr = document.createElement('tr');
        tr.dataset.tab = tab;
        tr.classList.add(idx % 2 === 0 ? 'eventtype-row-white' : 'eventtype-row-gray', 'sortable');

        tr.appendChild(createCell(tab,false,null,'operation-cell'));

        let totalsArray = [];
        if(selectedEmployee && !isType){
            totalsArray = columns.map(sid=>{
                return STATE.fullSessions.filter(s=>s.tab===tab && s.session_id===sid)
                    .reduce((sum,s)=>sum+s.durationSeconds,0);
            });
        } else {
            totalsArray = columns.map(u=>{
                return perUser[u]?.filter(s=>s.tab===tab)
                    .reduce((sum,s)=>sum+s.durationSeconds,0) || 0;
            });
        }

        const total = totalsArray.reduce((a,b)=>a+b,0);
        const avg = totalsArray.length ? total/totalsArray.length : 0;

        tr.appendChild(createCell(formatSecondsToHMS(avg), false, null,'summary-cell'));
        tr.appendChild(createCell(formatSecondsToHMS(total), false, null,'summary-cell'));

        totalsArray.forEach(val=>{
            const td = createCell(formatSecondsToHMS(val), false, null,'user-cell');
            td.dataset.sort = val;
            tr.appendChild(td);
        });

        tr.addEventListener('click', ()=> sortTableByRow(table, tr, STATE.rowSortStates, 3));
        tbody.appendChild(tr);
    });

    applyStickyColumns(table, 3);
    applyColumnHeatmap(table);
}

// ------------------------
// DRAW CHARTS
// ------------------------
function drawCharts(perUser, tabs, columns, selectedEmployee, isType){
    const chartContainer = document.getElementById('multiChartContainer');
    chartContainer.innerHTML='';
    chartContainer.style.display='grid';
    chartContainer.style.gridTemplateColumns='repeat(2,1fr)';
    chartContainer.style.gap='20px';

    columns.forEach(col=>{
        const chartWrapper = document.createElement('div');
        chartWrapper.style.border = '1px solid #ddd';
        chartWrapper.style.borderRadius = '6px';
        chartWrapper.style.padding = '10px';
        chartWrapper.style.background = '#fafafa';
        chartWrapper.style.display = 'flex';
        chartWrapper.style.flexDirection = 'column';
        chartWrapper.style.alignItems = 'center';

        const title = document.createElement('strong');
        title.textContent = col;
        chartWrapper.appendChild(title);

        const toggleWrapper = document.createElement('label');
        toggleWrapper.style.fontSize = '12px';
        toggleWrapper.style.margin = '5px 0';
        toggleWrapper.innerHTML = `<input type="checkbox"> Show as %`;
        chartWrapper.appendChild(toggleWrapper);
        const percentageCheckbox = toggleWrapper.querySelector('input');

        const canvas = document.createElement('canvas');
        canvas.style.width = '100%';
        canvas.style.height = '260px';
        chartWrapper.appendChild(canvas);
        chartContainer.appendChild(chartWrapper);

        const renderChart = ()=>{
            const labels = tabs;
            let data = tabs.map(tab=>{
                if(selectedEmployee && !isType){
                    return STATE.fullSessions.filter(s=>s.session_id===col && s.tab===tab)
                        .reduce((sum,s)=>sum+s.durationSeconds,0);
                } else {
                    return perUser[col]?.filter(s=>s.tab===tab).reduce((sum,s)=>sum+s.durationSeconds,0) || 0;
                }
            });

            if(percentageCheckbox.checked){
                const total = data.reduce((a,b)=>a+b,1);
                data = data.map(d=>(d/total*100).toFixed(2));
            }

            renderBarChart(canvas, labels, data, COLORS.slice(0, labels.length), {
                responsive: true,
                animation: false,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false }},
                scales: {
                    y: {
                        beginAtZero: true,
                        max: percentageCheckbox.checked ? 100 : undefined,
                        title: { display: true, text: percentageCheckbox.checked ? 'Percentage (%)' : 'Seconds' }
                    }
                }
            });
        };

        percentageCheckbox.addEventListener('change', renderChart);
        renderChart();
    });
}

// ------------------------
// DOWNLOAD CSV
// ------------------------
function downloadTableCSV(){
    const table = document.getElementById('bigTable');
    if(!table) return;

    const rows = [];
    table.querySelectorAll('thead tr, tbody tr').forEach(tr=>{
        const cells = Array.from(tr.querySelectorAll('th,td'));
        rows.push(cells.map(c=>c.innerText.trim().replace(/[\r\n\t]+/g,' ')).join(';'));
    });
    const csvContent = '\uFEFF' + rows.join('\r\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'session_data.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
downloadBtn.addEventListener('click', downloadTableCSV);
function toggleDownloadButton(show){ downloadBtn.style.display = show ? 'block' : 'none'; }

// ------------------------
// TIMELINE LOGIC
// ------------------------
const colorMap = {};
function getColor(eventType, payload) {
    const key = payload ? `${eventType}-${JSON.stringify(payload)}` : `${eventType}-null`;
    if(!colorMap[key]){
        const hue = (Object.keys(colorMap).length * 100) % 360;
        colorMap[key] = payload ? `hsl(${hue},50%,40%)` : "#888";
    }
    return colorMap[key];
}

async function loadTimeline(sessionId){
    timelineContainer.style.display = 'block';
    timelineSummary.innerHTML = timelineDiv.innerHTML = timelineLegend.innerHTML = '';
    Object.keys(colorMap).forEach(k=>delete colorMap[k]);

    const response = await fetch(`/sessionTimeline?sessionId=${sessionId}`);
    const data = await response.json();

    if(!data.timeline || !data.timeline.length){
        timelineSummary.innerHTML = '<p>No events found for this session.</p>';
        return;
    }

    const totalDuration = data.totalDurationSeconds || 1;

    // Summary
    timelineSummary.innerHTML = `<div class="summary">
      <strong>User:</strong> ${data.user_name}<br/>
      <strong>Employee Type:</strong> ${data.employee_type}<br/>
      <strong>Total Events:</strong> ${data.totalEvents}<br/>
      <strong>Total Duration:</strong> ${Math.round(totalDuration)} seconds
    </div>`;

    const MIN_TOTAL_WIDTH = 1200;
    const timelineTotalWidth = Math.max(data.timeline.length * 50, MIN_TOTAL_WIDTH);

    data.timeline.forEach(event=>{
        const box = document.createElement('div');
        box.className = 'event-box';
        const boxWidth = (event.durationSeconds / totalDuration) * timelineTotalWidth;
        box.style.width = boxWidth + "px";
        box.style.background = getColor(event.event_type, event.payload);
        box.title = `Event: ${event.event_type}\nDuration: ${Math.round(event.durationSeconds)} sec\nTime: ${new Date(event.time_stamp).toLocaleTimeString()}\nPayload: ${JSON.stringify(event.payload||{})}`;
        box.innerText = ""; // <-- remove text inside timeline boxes
        timelineDiv.appendChild(box);
    });

    const grouped = {};
    Object.keys(colorMap).forEach(key=>{
        const [type, payloadStr] = key.split(/-(.+)/);
        if(!grouped[type]) grouped[type]=[];
        grouped[type].push({key, payloadStr, color: colorMap[key]});
    });

    Object.keys(grouped).forEach(type=>{
        const column = document.createElement('div');
        column.className='legend-column';
        const title = document.createElement('div');
        title.className='legend-title';
        title.innerText = type;
        column.appendChild(title);

        grouped[type].forEach(item=>{
            const itemDiv = document.createElement('div');
            itemDiv.className='legend-item';
            const colorBox = document.createElement('div');
            colorBox.className='legend-color';
            colorBox.style.background = item.color;
            const label = document.createElement('span');
            label.innerText = item.payloadStr==='null' ? "No payload" : item.payloadStr;
            itemDiv.appendChild(colorBox);
            itemDiv.appendChild(label);
            column.appendChild(itemDiv);
        });

        timelineLegend.appendChild(column);
    });

    timelineContainer.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
