<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Session Viewer</title>
<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="styles/session.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="scripts/utils.js"></script>
<style>

</style>
</head>

<body>
<div id="tooltip" class="tooltip"></div>    

<header>
    <div class="navbar">
        <a href="index.html"><img src="images/ticra.png" alt="Home" class="nav-icon"></a>
        <a href="data.html">Event DataPool</a>
        <a href="session.html">Sessions</a>
    </div>
</header>

<h1>Session Viewer</h1>

<form id="filters">
    <div>
        <strong style="display:block; margin-bottom:8px;">Time Interval:</strong>
        <label>Start Time:
            <input type="datetime-local" id="startTime">
        </label>
        <label>End Time:
            <input type="datetime-local" id="endTime">
        </label>

        <button type="button" class="preset-btn" data-range="10">Last 10 days</button>
        <button type="button" class="preset-btn" data-range="30">Last 1 month</button>
        <button type="button" class="preset-btn" data-range="all">All time</button>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Event Type:</strong>
            <select id="eventTypeSelect"><option value="">Select Event Type</option></select>
        </label>
    </div>

    <div>
        <label>
            <strong style="display:block; margin-bottom:8px;">Employee / Employee Type:</strong>
            <select id="employeeSelect"><option value="">All</option></select>
        </label>
    </div>

    <button type="submit" id="applyButton">Apply</button>
</form>

<div id="descriptionImageContainer"></div>

<div id="tableContainerWrapper">
  <div id="tableContainer">
    <table id="bigTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="timelineContainer" style="display:none; margin:20px 0;">
  <h3>Session Timeline</h3>
  <div id="timelineSummary"></div>
  <div class="timeline-wrapper">
    <div id="timeline" class="timeline"></div>
  </div>
    <div style="margin-bottom:10px;">
        <button id="zoomOutBtn">- Zoom Out</button>
        <button id="zoomInBtn">+ Zoom In</button>
        <button id="zoomResetBtn">Reset Zoom</button>
    </div>
  <div id="timelineLegend" class="legend"></div>
</div>

<div id="multiChartContainer" class="chart-container"></div>

<footer>
  © TICRA foundation
</footer>

<script type="module">
import { 
  COLORS, setDefaultDateRange, fetchJson, createCell, sortTableByRow, renderBarChart, 
  applyStickyColumns, formatSecondsToHMS, downloadTableCSV
} from './scripts/utils.js';

const STATE = { fullSessions: [], activeUsers: [], userOrder: [], sessionOrder: [], rowSortStates: {} };

const eventTypeSelect = document.getElementById("eventTypeSelect");
const employeeSelect = document.getElementById("employeeSelect");
const startInput = document.getElementById("startTime");
const endInput = document.getElementById("endTime");
const applyButton = document.getElementById("applyButton");

const tooltip = document.getElementById('tooltip');

// Download button
const downloadBtn = document.createElement('span');
downloadBtn.id = 'downloadBtn';
downloadBtn.innerHTML = '<img src="/images/Excel-Logo.png" alt="Excel" width="100">';
downloadBtn.title = 'Download CSV';
downloadBtn.addEventListener('click', () => { downloadTableCSV(); });
document.getElementById('tableContainerWrapper').appendChild(downloadBtn);



// Initialize default date range
setDefaultDateRange('startTime','endTime',10);

// Load dropdowns
async function initDropdowns() {
    const eventTypes = await fetchJson('/sessionTypes');
    eventTypeSelect.innerHTML = '<option value="">Select Event Type</option>';
    eventTypes.forEach(e => { const opt = document.createElement('option'); opt.value=e; opt.textContent=e; eventTypeSelect.appendChild(opt); });

    const employeeTypes = await fetchJson('/employeeTypes');
    const users = await fetchJson('/users');
    employeeSelect.innerHTML = `<option value="">All</option>`;
    
    if(employeeTypes.length){
        const group = document.createElement("optgroup"); group.label="Employee Types";
        employeeTypes.forEach(t=>{ const opt=document.createElement("option"); opt.value=t; opt.textContent=t; opt.dataset.type="employeeType"; group.appendChild(opt); });
        employeeSelect.appendChild(group);
    }
    if(users.length){
        const group=document.createElement("optgroup"); group.label="Employees";
        [...new Set(users)].forEach(u=>{ const opt=document.createElement("option"); opt.value=u; opt.textContent=u; opt.dataset.type="user"; group.appendChild(opt); });
        employeeSelect.appendChild(group);
    }
}
initDropdowns();

// Format datetime-local
function formatDateTimeLocal(date) {
    const pad = n => n.toString().padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

// Preset buttons
function setPresetRange(range) {
    const now = new Date();
    let start;

    if (range === 'all') {
        start = new Date('2026-01-01T00:00:00');
    } else {
        start = new Date();
        if (range === 30) start.setMonth(now.getMonth() - 1);
        else start.setDate(now.getDate() - range);
    }

    startInput.value = formatDateTimeLocal(start);
    endInput.value = formatDateTimeLocal(now);
}

document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const range = btn.dataset.range;
        setPresetRange(range === 'all' ? 'all' : parseInt(range));
    });
});

// Tooltip function
async function loadDescriptionTooltip(configTitle) {
    if (!configTitle) return;
    try {
        const configQuery = await fetchJson(`/api/configs/${encodeURIComponent(configTitle)}`);
        const title = configQuery.title ?? configTitle;
        const description = configQuery.description ?? '';
        const imgObj = configQuery.extra_query?.image;

        let html = `<strong>${title}</strong>`;
        if (description) html += `<div>${description}</div>`;
        if (imgObj?.data) html += `<img src="data:${imgObj.contentType};base64,${imgObj.data}" style="margin-top:6px; max-width:300px; max-height:200px;">`;

        tooltip.innerHTML = html;
    } catch (e) {
        tooltip.innerHTML = `<strong>${configTitle}</strong><div>No description available</div>`;
    }
}

// Apply filters
applyButton.addEventListener('click', async e=>{
    e.preventDefault();
    const selectedConfig = eventTypeSelect.value;
    if(!selectedConfig) return;

    const selectedEmployee = employeeSelect.value || null;
    const selectedOption = employeeSelect.querySelector(`option[value="${selectedEmployee}"]`);
    const isType = selectedOption?.dataset.type==='employeeType';

    const startTime = startInput.value || new Date(Date.now()-30*24*60*60*1000).toISOString();
    const endTime = endInput.value || new Date().toISOString();
    const params = new URLSearchParams();
    params.append('configTitle', selectedConfig);
    params.append('startTime', startTime);
    params.append('endTime', endTime);
    if(isType && selectedEmployee) params.append('employee_type', selectedEmployee);
    else if(selectedEmployee) params.append('user_name', selectedEmployee);

    try{
        const data = await fetchJson(`/session?${params.toString()}`);
        STATE.fullSessions = data.sessions || [];
        renderTableAndCharts(selectedEmployee, isType);
    }catch(err){
        console.error(err); alert("Failed to load sessions.");
        STATE.fullSessions=[]; renderTableAndCharts();
    }
});

// Render table and charts
function renderTableAndCharts(selectedEmployee=null,isType=false){
    const sessions = STATE.fullSessions;
    const table=document.getElementById('bigTable');
    if(!sessions.length){
        table.querySelector('thead').innerHTML='';
        table.querySelector('tbody').innerHTML='';
        document.getElementById('multiChartContainer').innerHTML='';
        toggleDownloadButton(false);
        return;
    }

    const perUser={};
    sessions.forEach(s=>{ const user=s.user_name||"Unknown"; if(!perUser[user]) perUser[user]=[]; perUser[user].push(s); });

    let columns=[];
    if(selectedEmployee && !isType){ STATE.sessionOrder=[...new Set(sessions.map(s=>s.session_id))].sort(); columns=STATE.sessionOrder; }
    else { STATE.activeUsers=Object.keys(perUser).sort(); STATE.userOrder=[...STATE.activeUsers]; columns=STATE.userOrder; }

    const tabs=[...new Set(sessions.map(s=>s.tab))].sort();
    drawTable(perUser,tabs,selectedEmployee,isType);
    drawCharts(perUser,tabs,columns,selectedEmployee,isType);
    toggleDownloadButton(true);
}

// Toggle download button
function toggleDownloadButton(show){ downloadBtn.style.display=show?'block':'none'; }

// Color mapping for charts
const colorMap={};
function getColor(eventType,payload){ const key=payload?`${eventType}-${JSON.stringify(payload)}`:`${eventType}-null`; if(!colorMap[key]){ const hue=(Object.keys(colorMap).length*100)%360; colorMap[key]=payload?`hsl(${hue},50%,40%)`:"#888"; } return colorMap[key]; }

// ---------------------------- DRAW TABLE ----------------------------
async function drawTable(perUser, tabs, selectedEmployee, isType) {
  const table = document.getElementById('bigTable');
  const thead = table.querySelector('thead');
  const tbody = table.querySelector('tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  const columns = (selectedEmployee && !isType)
    ? [...new Set(STATE.fullSessions.map(s => s.session_id))].sort()
    : STATE.userOrder;

  // Build table header
  const headerRow = document.createElement('tr');
  ['Operation', 'AVERAGE', 'TOTAL', ...columns].forEach((text, idx) => {
    const th = document.createElement('th');
    th.classList.add('rotate', 'sticky');
    if (idx === 0) th.style.position = 'relative';

    let displayText = text;
    let sessionIdForClick = text;

    if (selectedEmployee && !isType && idx >= 3) {
      const session = STATE.fullSessions.find(s => s.session_id === text);
      if (session) {
        displayText = new Date(session.start_time).toLocaleString();
        sessionIdForClick = session.session_id;
      }
    }

    const div = document.createElement('div');
    div.textContent = displayText;

    if (selectedEmployee && !isType && idx >= 3) {
      div.style.cursor = "pointer";
      div.style.textDecoration = "underline";
      div.addEventListener('click', () => loadTimeline(sessionIdForClick));
    }

    th.appendChild(div);
    if (idx >= 3) th.classList.add('user-cell');
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);

  // Compute column max values for heatmap
  const columnMax = {};
  columns.forEach(col => {
    let maxVal = 0;
    tabs.forEach(tab => {
      let val = 0;
      if (selectedEmployee && !isType) {
        val = STATE.fullSessions.filter(s => s.tab === tab && s.session_id === col).reduce((a,b)=>a+b.durationSeconds,0);
      } else {
        val = perUser[col]?.filter(s=>s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0)||0;
      }
      if(val>maxVal) maxVal=val;
    });
    columnMax[col]=maxVal;
  });

  function getHeatmapColor(val,maxVal){
    if(maxVal===0) return {bg:'white',color:'#000'};
    const intensity = Math.pow(val/maxVal,0.5);
    const hue=120; const lightness=100-intensity*60;
    return { bg:`hsl(${hue},70%,${lightness}%)`, color:intensity>0.6?'#fff':'#000' };
  }

  for(const tab of tabs){
    const tr=document.createElement('tr'); tr.dataset.tab=tab; tr.classList.add('sortable');
    const opCell=createCell(tab,false,null,'operation-cell'); tr.appendChild(opCell);

    opCell.addEventListener('mouseenter', async () => {
      tooltip.style.display = 'block';
      tooltip.innerHTML = '';
      let configTitle = eventTypeSelect.value || tab;
      await loadDescriptionTooltip(configTitle);
      const rect = opCell.getBoundingClientRect();
      tooltip.style.top = `${rect.top - tooltip.offsetHeight - 6 + window.scrollY}px`;
      tooltip.style.left = `${rect.right - tooltip.offsetWidth + window.scrollX}px`;
    });
    opCell.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

    const totalsArray = columns.map(col=>{
      if(selectedEmployee && !isType) return STATE.fullSessions.filter(s=>s.tab===tab && s.session_id===col).reduce((a,b)=>a+b.durationSeconds,0);
      else return perUser[col]?.filter(s=>s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0)||0;
    });
    const total=totalsArray.reduce((a,b)=>a+b,0);
    const avg=totalsArray.length?total/totalsArray.length:0;
    tr.appendChild(createCell(formatSecondsToHMS(avg),false,null,'summary-cell'));
    tr.appendChild(createCell(formatSecondsToHMS(total),false,null,'summary-cell'));

    totalsArray.forEach((val,i)=>{
      const td=createCell(formatSecondsToHMS(val),false,null,'user-cell');
      td.dataset.sort=val;
      const {bg,color}=getHeatmapColor(val,columnMax[columns[i]]);
      td.style.backgroundColor=bg; td.style.color=color;
      tr.appendChild(td);
    });

    tr.addEventListener('mouseenter',()=>{ opCell.style.backgroundColor='rgba(252,199,93,0.5)'; opCell.style.fontWeight='bold'; });
    tr.addEventListener('mouseleave',()=>{ opCell.style.backgroundColor=''; opCell.style.fontWeight=''; });
    tr.addEventListener('click',()=>sortTableByRow(table,tr,STATE.rowSortStates,3));

    tbody.appendChild(tr);
  }

  applyStickyColumns(table, 3);
  toggleDownloadButton(tbody.children.length>0);

  // ---------------------- Make Columns Resizable ----------------------
  function makeColumnsResizable(table){
    const headers = table.querySelectorAll("thead th");
    headers.forEach((th,colIndex)=>{
      if(th.querySelector('.col-resizer')) return;
      const resizer=document.createElement('div'); resizer.className='col-resizer';
      th.appendChild(resizer);
      let startX,startWidth;
      resizer.addEventListener('mousedown',e=>{
        e.stopPropagation();
        startX=e.pageX; startWidth=th.offsetWidth;
        function onMouseMove(e){
          const newWidth=Math.max(40,startWidth+(e.pageX-startX));
          th.style.width=newWidth+'px';
          table.querySelectorAll(`tr td:nth-child(${colIndex+1})`).forEach(td=>td.style.width=newWidth+'px');
        }
        function onMouseUp(){ document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); }
        document.addEventListener('mousemove',onMouseMove);
        document.addEventListener('mouseup',onMouseUp);
      });
    });
  }

  // ---------------------- Make Rows Resizable ----------------------
  function makeRowsResizable(table){
    const rows=table.querySelectorAll("tbody tr");
    rows.forEach(row=>{
      const firstCell=row.querySelector("td");
      if(!firstCell || firstCell.querySelector('.row-resizer')) return;
      firstCell.style.position="relative";
      const resizer=document.createElement('div'); resizer.className='row-resizer';
      firstCell.appendChild(resizer);
      let startY,startHeight;
      resizer.addEventListener('mousedown',e=>{
        e.stopPropagation();
        startY=e.pageY; startHeight=row.offsetHeight;
        function onMouseMove(e){ row.style.height=Math.max(24,startHeight+(e.pageY-startY))+'px'; }
        function onMouseUp(){ document.removeEventListener('mousemove',onMouseMove); document.removeEventListener('mouseup',onMouseUp); }
        document.addEventListener('mousemove',onMouseMove);
        document.addEventListener('mouseup',onMouseUp);
      });
    });
  }

  makeColumnsResizable(table);
  makeRowsResizable(table);
}

// ---------------------------- NEW TIMELINE FUNCTION ----------------------------
async function loadTimeline(sessionId) {
    const timelineContainer = document.getElementById('timelineContainer');
    const timelineDiv = document.getElementById('timeline');
    const timelineLegend = document.getElementById('timelineLegend');
    const timelineSummary = document.getElementById('timelineSummary');
    const tooltip = document.getElementById('tooltip');

    timelineContainer.style.display = 'block';
    timelineDiv.innerHTML = timelineLegend.innerHTML = timelineSummary.innerHTML = '';
    Object.keys(colorMap).forEach(k => delete colorMap[k]);
    timelineDiv.style.position = 'relative';

    try {
        const response = await fetch(`/sessionTimeline?sessionId=${sessionId}`);
        const data = await response.json();
        if (!data.timeline?.length) {
            timelineSummary.innerHTML = '<p>No events found for this session.</p>';
            return;
        }

        // --- Helper: format seconds to hh:mm:ss
        function formatDuration(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        // --- Session summary ---
        const timestamps = data.timeline.map(ev => new Date(ev.time_stamp)).filter(Boolean);
        const startTime = timestamps.length ? new Date(Math.min(...timestamps)) : null;
        const endTime = timestamps.length ? new Date(Math.max(...timestamps)) : null;

        timelineSummary.innerHTML = `
            <div class="summary">
                <strong>Session ID:</strong> ${data.sessionId}<br/>
                <strong>User:</strong> ${data.user_name}<br/>
                <strong>Employee Type:</strong> ${data.employee_type}<br/>
                <strong>Total Events:</strong> ${data.totalEvents}<br/>
                <strong>Duration:</strong> ${startTime?.toLocaleString() ?? 'N/A'} - ${endTime?.toLocaleString() ?? 'N/A'} (Total time spent: ${formatDuration(data.totalDurationSeconds)})
            </div>
        `;

        const totalDuration = data.totalDurationSeconds || 1;
        const MIN_TOTAL_WIDTH = 1200;
        const timelineTotalWidth = Math.max(data.timeline.length * 50, MIN_TOTAL_WIDTH);

        // --- Tabpage blocks ---
        const tabEventMap = {};
        data.timeline.forEach(ev => {
            if (ev.event_type === 'Tabpage') {
                const box = document.createElement('div');
                box.className = 'event-box';
                box.dataset.eventNumber = ev.event_number;
                box.dataset.startTime = new Date(ev.time_stamp).getTime();
                box.dataset.durationSeconds = ev.durationSeconds;

                const width = Math.max((ev.durationSeconds / totalDuration) * timelineTotalWidth, 20);
                box.style.width = width + 'px';
                box.style.backgroundColor = getColor(ev.event_type, ev.payload) || '#666';

                const text = document.createElement('div');
                text.className = 'tabpage-text';
                text.innerText = ev.payload ?? '';
                box.appendChild(text);

                // Hover tooltip for tabpage block
                box.addEventListener('mouseenter', e => {
                    tooltip.style.display = 'block';
                    const startTimeStr = new Date(ev.time_stamp).toLocaleTimeString();
                    tooltip.innerText = `Tab: ${ev.payload ?? 'N/A'}\nStart Time: ${startTimeStr}\nTotal time spent: ${formatDuration(ev.durationSeconds)}`;
                });
                box.addEventListener('mousemove', e => {
                    tooltip.style.left = e.pageX + 10 + 'px';
                    tooltip.style.top = e.pageY + 10 + 'px';
                });
                box.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

                timelineDiv.appendChild(box);
                tabEventMap[ev.event_number] = box;
            }
        });

        // --- Other events as vertical lines passing through timeline ---
        data.timeline.forEach(ev => {
            if (ev.event_type !== 'Tabpage') {
                const tabEvent = data.timeline.slice(0, data.timeline.indexOf(ev)).reverse().find(e => e.event_type === 'Tabpage');
                if (!tabEvent) return;
                const parentBox = tabEventMap[tabEvent.event_number];
                if (!parentBox) return;

                const line = document.createElement('div');
                line.className = 'event-line';
                line.style.backgroundColor = getColor(ev.event_type, ev.payload) || '#333';
                line.style.position = 'absolute';

                const boxWidth = parentBox.offsetWidth;
                const boxStartTime = new Date(tabEvent.time_stamp).getTime();
                const boxEndTime = boxStartTime + tabEvent.durationSeconds * 1000;
                const eventTime = new Date(ev.time_stamp).getTime();
                const percent = Math.min(Math.max((eventTime - boxStartTime) / (boxEndTime - boxStartTime), 0), 1);

                line.style.left = `${parentBox.offsetLeft + percent * boxWidth}px`;
                line.style.top = `-50px`;
                line.style.width = '2px';
                line.style.height = `${parentBox.offsetHeight + 50}px`;

                // Tooltip for vertical line
                line.addEventListener('mouseenter', e => {
                    tooltip.style.display = 'block';
                    tooltip.innerText = `${ev.event_type}\nPayload: ${ev.payload ?? 'None'}\nTime: ${new Date(ev.time_stamp).toLocaleTimeString()}`;
                });
                line.addEventListener('mousemove', e => {
                    tooltip.style.left = e.pageX + 10 + 'px';
                    tooltip.style.top = e.pageY + 10 + 'px';
                });
                line.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

                timelineDiv.appendChild(line);
            }
        });

        // --- Legend ---
        const grouped = {};
        Object.keys(colorMap).forEach(key => {
            const [type, payloadStr] = key.split(/-(.+)/);
            if (!grouped[type]) grouped[type] = [];
            grouped[type].push({ key, payloadStr, color: colorMap[key] });
        });
        Object.keys(grouped).forEach(type => {
            const column = document.createElement('div');
            column.className = 'legend-column';
            const title = document.createElement('div');
            title.className = 'legend-title';
            title.innerText = type;
            column.appendChild(title);

            grouped[type].forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'legend-item';
                const colorBox = document.createElement('div');
                colorBox.className = 'legend-color';
                colorBox.style.backgroundColor = item.color;
                const label = document.createElement('span');
                label.innerText = item.payloadStr === 'null' ? 'No payload' : item.payloadStr;
                itemDiv.appendChild(colorBox);
                itemDiv.appendChild(label);
                column.appendChild(itemDiv);
            });

            timelineLegend.appendChild(column);
        });

        timelineContainer.scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
        console.error("Failed to load timeline:", err);
        timelineSummary.innerHTML = '<p>Unable to load timeline.</p>';
    }
}

let zoomFactor = 1;
const ZOOM_STEP = 0.2;
const MIN_ZOOM = 0.5;
const MAX_ZOOM = 3;

const timelineDiv = document.getElementById('timeline');

document.getElementById('zoomInBtn').addEventListener('click', () => {
    zoomFactor = Math.min(zoomFactor + ZOOM_STEP, MAX_ZOOM);
    timelineDiv.style.transform = `scaleX(${zoomFactor})`;
    timelineDiv.style.transformOrigin = 'left center';
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
    zoomFactor = Math.max(zoomFactor - ZOOM_STEP, MIN_ZOOM);
    timelineDiv.style.transform = `scaleX(${zoomFactor})`;
    timelineDiv.style.transformOrigin = 'left center';
});

document.getElementById('zoomResetBtn').addEventListener('click', () => {
    zoomFactor = 1;
    timelineDiv.style.transform = `scaleX(1)`;
});


// ---------------------------- DRAW CHARTS ----------------------------
function drawCharts(perUser,tabs,columns,selectedEmployee,isType){
    const chartContainer=document.getElementById('multiChartContainer'); 
    chartContainer.innerHTML=''; 
    chartContainer.style.display='grid'; 
    chartContainer.style.gridTemplateColumns='repeat(2,1fr)'; 
    chartContainer.style.gap='20px';
    columns.forEach(col=>{
        const chartWrapper=document.createElement('div'); 
        chartWrapper.style.border='1px solid #ddd'; 
        chartWrapper.style.borderRadius='6px'; 
        chartWrapper.style.padding='10px'; 
        chartWrapper.style.background='#fafafa'; 
        chartWrapper.style.display='flex'; 
        chartWrapper.style.flexDirection='column'; 
        chartWrapper.style.alignItems='center';
        const title=document.createElement('strong'); title.textContent=col; chartWrapper.appendChild(title);
        const toggleWrapper=document.createElement('label'); toggleWrapper.style.fontSize='12px'; toggleWrapper.style.margin='5px 0';
        toggleWrapper.innerHTML=`<input type="checkbox"> Show as %`; chartWrapper.appendChild(toggleWrapper);
        const percentageCheckbox=toggleWrapper.querySelector('input');
        const canvas=document.createElement('canvas'); canvas.style.width='100%'; canvas.style.height='260px'; chartWrapper.appendChild(canvas);
        chartContainer.appendChild(chartWrapper);
        const renderChart=()=>{
            const labels=tabs;
            let data=tabs.map(tab=>{
                if(selectedEmployee && !isType) return STATE.fullSessions.filter(s=>s.session_id===col && s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0);
                else return perUser[col]?.filter(s=>s.tab===tab).reduce((a,b)=>a+b.durationSeconds,0)||0;
            });
            if(percentageCheckbox.checked){ const total=data.reduce((a,b)=>a+b,1); data=data.map(d=>(d/total*100).toFixed(2)); }
            renderBarChart(canvas,labels,data,COLORS.slice(0,labels.length),{
                responsive:true,
                animation:false,
                maintainAspectRatio:false,
                interaction:{mode:'index',intersect:false},
                plugins:{legend:{display:false}},
                scales:{y:{beginAtZero:true,max:percentageCheckbox.checked?100:undefined,title:{display:true,text:percentageCheckbox.checked?'Percentage (%)':'Seconds'}}}
            });
        };
        percentageCheckbox.addEventListener('change',renderChart);
        renderChart();
    });
}
</script>

</body>
</html>
